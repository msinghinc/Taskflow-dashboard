// ---- KPI WEEKLY TRACKER ----
function renderKPITracker() {
  const now = new Date();
  const getWeekStart = (d) => { const dt = new Date(d); dt.setHours(0,0,0,0); dt.setDate(dt.getDate() - dt.getDay()); return dt; };
  const periodStart = getWeekStart(now);
  const periodEnd = new Date(periodStart.getTime() + 7*864e5);
  let label = "This Week";
  let filterFn = (ts) => ts >= periodStart.getTime() && ts < periodEnd.getTime();
  let filterDate = (d) => { const dt = new Date(d+"T00:00:00"); return dt >= periodStart && dt < periodEnd; };

  if (state.kpiPeriod === "month") {
    const ms = new Date(now.getFullYear(), now.getMonth(), 1);
    const me = new Date(now.getFullYear(), now.getMonth()+1, 1);
    filterFn = (ts) => ts >= ms.getTime() && ts < me.getTime();
    filterDate = (d) => { const dt = new Date(d+"T00:00:00"); return dt >= ms && dt < me; };
    label = now.toLocaleString('default',{month:'long'}) + " " + now.getFullYear();
  } else if (state.kpiPeriod === "quarter") {
    const q = Math.floor(now.getMonth()/3);
    const qs = new Date(now.getFullYear(), q*3, 1);
    const qe = new Date(now.getFullYear(), q*3+3, 1);
    filterFn = (ts) => ts >= qs.getTime() && ts < qe.getTime();
    filterDate = (d) => { const dt = new Date(d+"T00:00:00"); return dt >= qs && dt < qe; };
    label = "Q" + (q+1) + " " + now.getFullYear();
  } else if (state.kpiPeriod === "year") {
    const ys = new Date(now.getFullYear(), 0, 1);
    const ye = new Date(now.getFullYear()+1, 0, 1);
    filterFn = (ts) => ts >= ys.getTime() && ts < ye.getTime();
    filterDate = (d) => { const dt = new Date(d+"T00:00:00"); return dt >= ys && dt < ye; };
    label = now.getFullYear().toString();
  }

  // Calculate KPIs
  const findingProps = state.deals.filter(d => d.createdAt && filterFn(d.createdAt)).length;
  const propUW = state.deals.filter(d => d.uwGeneratedDate && filterFn(d.uwGeneratedDate)).length;
  const loiCreated = state.deals.filter(d => (d.loiGeneratedDate && filterFn(d.loiGeneratedDate)) || (d.loiSentDate && filterDate(d.loiSentDate) && !d.loiGeneratedDate)).length;
  const loiSent = state.deals.filter(d => d.loiSentDate && filterDate(d.loiSentDate)).length;
  let newBrokerCalls = 0, followUpCalls = 0;
  state.deals.forEach(d => {
    (d.callLog||[]).forEach((c,i) => {
      if (c.time && filterFn(c.time)) { if(i===0) newBrokerCalls++; else followUpCalls++; }
    });
  });
  const dealsClosed = state.deals.filter(d => d.stage==="loi_accepted" && d.stageChangedDate && filterFn(d.stageChangedDate)).length;
  const loiCounter = state.deals.filter(d => d.loiCounteredDate && filterFn(d.loiCounteredDate)).length;
  const pctCountered = loiSent > 0 ? Math.round(loiCounter/loiSent*100) : 0;

  // Scale goals by period
  const goalMult = state.kpiPeriod === "month" ? 4 : state.kpiPeriod === "quarter" ? 13 : state.kpiPeriod === "year" ? 52 : 1;
  const g = (key) => Math.round(KPI_GOALS[key] * goalMult);

  const kpis = [
    { label:"Finding Properties", actual:findingProps, goal:g("findingProperties") },
    { label:"Property UW", actual:propUW, goal:g("propertyUW") },
    { label:"LOI Created", actual:loiCreated, goal:g("loiCreated") },
    { label:"LOI Sent", actual:loiSent, goal:g("loiSent") },
    { label:"LOI Counter", actual:loiCounter, goal:null },
    { label:"% Countered", actual:pctCountered+"%", goal:"80%+" },
    { label:"New Broker Calls", actual:newBrokerCalls, goal:g("callNewBrokers") },
    { label:"Broker Follow Up", actual:followUpCalls, goal:g("brokerFollowUp") },
    { label:"Deals Closed", actual:dealsClosed, goal:g("dealsClosed") },
  ];

  // Grade
  const graded = kpis.filter(k => k.goal && typeof k.goal === "number");
  const grade = graded.length ? Math.round(graded.reduce((s,k) => s + Math.min(k.actual/k.goal, 1), 0) / graded.length * 100) : 0;
  const gradeColor = grade >= 80 ? "#10B981" : grade >= 50 ? "#E8A838" : "#EF4444";

  const periodLabel = state.kpiPeriod === "week" ? "Weekly" : state.kpiPeriod === "month" ? "Monthly" : state.kpiPeriod === "quarter" ? "Quarterly" : "Yearly";
  let h = `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin:0 32px 16px">`;
  h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="display:flex;align-items:center;gap:12px"><span class="stat-label">${periodLabel} Scorecard</span><span style="font-size:11px;color:var(--text-muted)">${label}</span></div>`;
  h += `<div style="display:flex;align-items:center;gap:8px"><div style="display:flex;gap:2px">`;
  ["week","month","quarter","year"].forEach(p => {
    h += `<button data-kpi-period="${p}" style="padding:4px 10px;border:1px solid ${state.kpiPeriod===p?'#3B82F6':'var(--border)'};border-radius:6px;font-size:10px;cursor:pointer;background:${state.kpiPeriod===p?'#3B82F620':'transparent'};color:${state.kpiPeriod===p?'#3B82F6':'var(--text-muted)'};font-weight:600;font-family:'Inter',sans-serif">${p.charAt(0).toUpperCase()+p.slice(1)}</button>`;
  });
  h += `</div><div style="text-align:center;min-width:60px"><div style="font-size:22px;font-weight:800;font-family:'Inter',sans-serif;color:${gradeColor}">${grade}%</div><div style="font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Grade</div></div></div></div>`;

  h += `<div style="display:grid;grid-template-columns:repeat(${kpis.length},1fr);gap:8px">`;
  kpis.forEach(k => {
    const pct = (k.goal && typeof k.goal === "number") ? Math.min(Math.round(k.actual/k.goal*100),100) : null;
    const barColor = pct !== null ? (pct >= 80 ? "#10B981" : pct >= 50 ? "#E8A838" : "#EF4444") : "#3B82F6";
    h += `<div style="text-align:center"><div style="font-size:16px;font-weight:800;font-family:'Inter',sans-serif;color:var(--text)">${k.actual}</div>`;
    if (k.goal && typeof k.goal === "number") {
      h += `<div style="height:4px;background:var(--border-light);border-radius:2px;margin:4px 0;overflow:hidden"><div style="height:100%;width:${pct}%;background:${barColor};border-radius:2px"></div></div>`;
      h += `<div style="font-size:8px;color:var(--text-muted)">/ ${k.goal}</div>`;
    }
    h += `<div style="font-size:9px;color:var(--text-muted);margin-top:2px">${k.label}</div></div>`;
  });
  h += `</div></div>`;
  return h;
}

function getContacts() {
  const contacts = [];
  state.deals.forEach(d => {
    if (!d.broker && !d.brokerContact && !d.brokerPhone && !d.brokerEmail) return;
    const name = d.brokerContact || d.broker || "";
    if (!name) return;
    const existing = contacts.find(c => (c.phone && d.brokerPhone && c.phone === d.brokerPhone) || (c.email && d.brokerEmail && c.email === d.brokerEmail) || (c.name === name && c.company === d.broker));
    if (existing) { if (!existing.deals.find(dl => dl.id === d.id)) existing.deals.push({ id:d.id, name:d.name, stage:d.stage }); }
    else contacts.push({ id:"c-"+d.id, type:"broker", name, company:d.broker||"", phone:d.brokerPhone||"", email:d.brokerEmail||"", deals:[{id:d.id,name:d.name,stage:d.stage}] });
  });
  return contacts;
}

// ---- TENANT TIMELINE ----
function renderTenantTimeline(tenants) {
  const currentYear = new Date().getFullYear();
  let minYear = currentYear - 2, maxYear = currentYear + 5;
  tenants.forEach(t => {
    if(t.leaseStart){ const y=new Date(t.leaseStart).getFullYear(); if(y<minYear)minYear=y; }
    if(t.leaseEnd&&t.leaseEnd!=="MTM"){ const y=new Date(t.leaseEnd).getFullYear(); if(y+1>maxYear)maxYear=y+1; }
    // Check lease schedule events for date range
    (t.leaseSchedule||[]).forEach(ev=>{

      if(ev.endDate){const y=new Date(ev.endDate).getFullYear();if(y+1>maxYear)maxYear=y+1;}
    });
  });
  // Reversed: newer years on left, older on right
  const years=[]; for(let y=maxYear;y>=minYear;y--)years.push(y);

  const eventColors = {
    "Original Lease":"#3B82F6","Escalation":"#F59E0B","Extension":"#0EA5E9",
    "Renewal":"#10B981","Option":"#8B5CF6","Amendment":"#EC4899",

  };

  let h=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--border)"><div style="font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--text)">Lease Timeline</div>`;
  h+=`<div style="display:flex;gap:10px;font-size:9px;color:var(--text-muted);flex-wrap:wrap">`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#6366F1"></span>NNN</span>`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#10B981"></span>Gross</span>`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#EF4444"></span>Vacant</span>`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:50%;background:#F59E0B"></span>Esc</span>`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:50%;background:#0EA5E9"></span>Ext</span>`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:50%;background:#8B5CF6"></span>Opt</span>`;
  h+=`<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:50%;background:#EC4899"></span>Amend</span>`;
  h+=`</div></div>`;

  h+=`<div style="overflow-x:auto"><div style="min-width:${Math.max(800,years.length*100)}px">`;
  // Year headers (reversed)
  h+=`<div style="display:flex;border-bottom:1px solid var(--border)"><div style="width:180px;flex-shrink:0;padding:8px 16px;font-size:10px;color:var(--text-muted);font-weight:600">TENANT</div>`;

  h+=`</div>`;

  // For positioning: range goes from maxYear+1 (left=0%) to minYear (right=100%) since reversed
  const rangeLeftDate=new Date(maxYear+1,0,1).getTime(), rangeRightDate=new Date(minYear,0,1).getTime();
  const rangeLen=Math.abs(rangeLeftDate-rangeRightDate);
  const todayFrac=Math.max(0,Math.min(100,(rangeLeftDate-Date.now())/rangeLen*100));

  tenants.forEach(t=>{
    const typeColor=t.isVacant?"#EF4444":t.leaseType==="nnn"?"#6366F1":"#10B981";
    h+=`<div style="display:flex;border-bottom:1px solid var(--border-light);min-height:56px">`;

    h+=`<div style="flex:1;display:flex;position:relative">`;
    // Today line
    h+=`<div style="position:absolute;left:${todayFrac}%;top:0;bottom:0;width:2px;background:#EF4444;z-index:5;opacity:0.7"></div>`;
    // Year grid
    years.forEach(()=>{h+=`<div style="flex:1;border-left:1px solid var(--border-light)"></div>`;});

    // Helper to convert date to % position (reversed)
    const toPos = (dateStr) => {
      const d = new Date(dateStr).getTime();
      return Math.max(0, Math.min(100, (rangeLeftDate - d) / rangeLen * 100));
    };

    // Main lease bar
    if(!t.isVacant&&t.leaseStart){
      const barLeft=toPos(t.leaseEnd==="MTM"?new Date().toISOString():t.leaseEnd);
      const barRight=toPos(t.leaseStart);
      const barWidth=barRight-barLeft;
      if(barWidth>0) h+=`<div style="position:absolute;left:${barLeft}%;width:${barWidth}%;top:14px;height:24px;background:${typeColor}25;border:1px solid ${typeColor}50;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:600;color:${typeColor};overflow:hidden;white-space:nowrap;z-index:2">$${t.rentPerSf||0}/SF${t.leaseEnd==="MTM"?" (MTM)":""}</div>`;
    } else if(t.isVacant){
      h+=`<div style="position:absolute;left:0%;width:100%;top:14px;height:24px;background:#EF444410;border:1px dashed #EF444430;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#EF4444;z-index:2">VACANT</div>`;
    }

    // Lease schedule event markers
    const events = t.leaseSchedule || [];
    events.forEach(ev=>{
      if(!ev.startDate) return;
      const evPos = toPos(ev.startDate);
      const color = eventColors[ev.eventType] || "#94A3B8";
      const isRange = ev.endDate && (ev.eventType==="Extension"||ev.eventType==="Renewal"||ev.eventType==="Option"||ev.eventType==="Free Rent");

      if(isRange && ev.endDate){
        // Range bar (dashed for options, solid for extensions/renewals)
        const evLeft=toPos(ev.endDate);
        const evRight=toPos(ev.startDate);
        const evWidth=evRight-evLeft;
        const isDashed = ev.eventType==="Option";
        if(evWidth>0) h+=`<div style="position:absolute;left:${evLeft}%;width:${evWidth}%;top:6px;height:8px;background:${color}20;border:1px ${isDashed?'dashed':'solid'} ${color}50;border-radius:3px;z-index:3" title="${ev.eventType}: ${ev.startDate} to ${ev.endDate}${ev.notes?' — '+ev.notes:''}"></div>`;
      } else {
        // Dot marker for escalations, amendments, addendums
        h+=`<div style="position:absolute;left:${evPos}%;top:8px;width:8px;height:8px;border-radius:50%;background:${color};border:2px solid var(--bg-card);z-index:4;cursor:pointer;margin-left:-4px" title="${ev.eventType}${ev.bumpPct?' '+ev.bumpPct+'%':''}${ev.annualRentSf?' $'+ev.annualRentSf+'/SF':''}${ev.notes?' — '+ev.notes:''}"></div>`;
      }
    });

    h+=`</div></div>`;
  });
  h+=`</div></div></div>`;
  return h;
}

  });
  // KPI period toggle
  document.querySelectorAll("[data-kpi-period]").forEach(btn=>{btn.addEventListener("click",()=>{state.kpiPeriod=btn.dataset.kpiPeriod;render();});});
}

// ---- AM SECTION ----
function renderAMSection(){
  let propList=state.properties;
  if(state.search){const q=state.search.toLowerCase();propList=propList.filter(p=>(p.name||"").toLowerCase().includes(q)||(p.address||"").toLowerCase().includes(q)||(p.tenant||"").toLowerCase().includes(q));}
  if(!propList.length)return`<div style="text-align:center;padding:60px 0;color:var(--text-muted)"><p style="font-size:16px;font-weight:600">No properties yet</p></div>`;
  let h=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">`;
  propList.forEach(p=>{const tasks=p.tasks||[];const active=tasks.filter(t=>!t.completed);const overdue=active.filter(t=>t.dueDate&&new Date(t.dueDate+"T00:00:00")<new Date());const isExp=state.selectedProp===p.id;
    h+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;cursor:pointer;padding:16px" data-prop-id="${p.id}">`;
    h+=`<div style="font-size:14px;font-weight:700;color:var(--text)">${esc(p.name)}</div>${p.address?`<div style="font-size:11px;color:var(--text-muted);margin-top:2px">${esc(p.address)}</div>`:''}`;
    h+=`<div style="display:flex;gap:16px;margin-top:10px;font-size:12px">${p.noi?`<div><span style="color:var(--text-muted)">NOI</span> <span style="font-weight:700;color:var(--text)">${fmt$(p.noi)}</span></div>`:''}${p.tenant?`<div><span style="color:var(--text-muted)">Tenant</span> <span style="font-weight:700;color:var(--text)">${esc(p.tenant)}</span></div>`:''}</div>`;
    if(active.length||overdue.length){h+=`<div style="display:flex;gap:6px;margin-top:8px">${active.length?`<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:#EFF6FF;color:#3B82F6;font-weight:600">${active.length} tasks</span>`:''}${overdue.length?`<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:#FEF2F2;color:#EF4444;font-weight:600">${overdue.length} overdue</span>`:''}</div>`;}
    if(isExp){
      const tenants = p.tenants || [];
      if(tenants.length) h += renderTenantTimeline(tenants);
      if(tasks.length){h+=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">`;tasks.forEach(t=>{h+=`<div style="display:flex;align-items:flex-start;gap:8px;padding:4px 0;font-size:12px"><span style="color:${t.completed?'#10B981':'var(--text-muted)'}">${t.completed?'✓':'○'}</span><span style="color:${t.completed?'var(--text-muted)':'var(--text)'};${t.completed?'text-decoration:line-through':''}">${esc(t.text)}</span></div>`;});h+=`</div>`;}
    }
    h+=`</div>`;
  });
  h+=`</div>`;return h;
}
function wireAMEvents(){document.querySelectorAll("[data-prop-id]").forEach(card=>{card.addEventListener("click",()=>{state.selectedProp=state.selectedProp===card.dataset.propId?null:card.dataset.propId;render();});});}

// ---- KPIs TAB ----
function renderKPIsTab() {
  const now = Date.now();
  const DAY = 864e5;
  const all = state.deals;
  const active = all.filter(d => d.stage !== "dead" && d.stage !== "loi_accepted");

  function calcKPIs(periodStart, periodEnd, goalMult) {
    const filterFn = (ts) => ts >= periodStart && ts < periodEnd;
    const filterDate = (d) => { if(!d)return false; const dt=new Date(d+"T00:00:00").getTime(); return dt>=periodStart && dt<periodEnd; };
    const findingProps = all.filter(d => d.createdAt && filterFn(d.createdAt)).length;
    const propUW = all.filter(d => d.uwGeneratedDate && filterFn(d.uwGeneratedDate)).length;
    const loiCreated = all.filter(d => (d.loiGeneratedDate && filterFn(d.loiGeneratedDate)) || (d.loiSentDate && filterDate(d.loiSentDate) && !d.loiGeneratedDate)).length;
    const loiSent = all.filter(d => d.loiSentDate && filterDate(d.loiSentDate)).length;
    let newCalls=0,followCalls=0;
    all.forEach(d=>{(d.callLog||[]).forEach((c,i)=>{if(c.time&&filterFn(c.time)){if(i===0)newCalls++;else followCalls++;}});});
    const closed = all.filter(d=>d.stage==="loi_accepted"&&d.stageChangedDate&&filterFn(d.stageChangedDate)).length;
    const g = (key) => Math.round(KPI_GOALS[key] * goalMult);
    const kpis = [
      {label:"Properties Found",actual:findingProps,goal:g("findingProperties")},
      {label:"UW Generated",actual:propUW,goal:g("propertyUW")},
      {label:"LOI Created",actual:loiCreated,goal:g("loiCreated")},
      {label:"LOI Sent",actual:loiSent,goal:g("loiSent")},
      {label:"New Broker Calls",actual:newCalls,goal:g("callNewBrokers")},
      {label:"Broker Follow Up",actual:followCalls,goal:g("brokerFollowUp")},
      {label:"Deals Closed",actual:closed,goal:g("dealsClosed")},
    ];
    const graded=kpis.filter(k=>k.goal>0);
    const grade=graded.length?Math.round(graded.reduce((s,k)=>s+Math.min(k.actual/k.goal,1),0)/graded.length*100):0;
    return {kpis,grade};
  }

  // Calculate periods
  const nowDate = new Date();
  const weekStart = new Date(nowDate); weekStart.setHours(0,0,0,0); weekStart.setDate(weekStart.getDate()-weekStart.getDay());
  const monthStart = new Date(nowDate.getFullYear(),nowDate.getMonth(),1);
  const qtr = Math.floor(nowDate.getMonth()/3);
  const qtrStart = new Date(nowDate.getFullYear(),qtr*3,1);
  const yearStart = new Date(nowDate.getFullYear(),0,1);
  const weekEnd = weekStart.getTime()+7*DAY;
  const monthEnd = new Date(nowDate.getFullYear(),nowDate.getMonth()+1,1).getTime();
  const qtrEnd = new Date(nowDate.getFullYear(),qtr*3+3,1).getTime();
  const yearEnd = new Date(nowDate.getFullYear()+1,0,1).getTime();

  const weekly = calcKPIs(weekStart.getTime(),weekEnd,1);
  const monthly = calcKPIs(monthStart.getTime(),monthEnd,4);
  const quarterly = calcKPIs(qtrStart.getTime(),qtrEnd,13);
  const yearly = calcKPIs(yearStart.getTime(),yearEnd,52);

  let h = `<div style="max-width:1440px;margin:0 auto">`;

  // 4 Scorecard cards
  h += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">`;
  [{label:"Weekly",data:weekly,sub:"This Week"},{label:"Monthly",data:monthly,sub:nowDate.toLocaleString('default',{month:'long'})},{label:"Quarterly",data:quarterly,sub:"Q"+(qtr+1)+" "+nowDate.getFullYear()},{label:"Yearly",data:yearly,sub:nowDate.getFullYear().toString()}].forEach(card=>{
    const gc=card.data.grade>=80?"#10B981":card.data.grade>=50?"#E8A838":"#EF4444";
    h+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px">`;
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div><div style="font-size:14px;font-weight:700;color:var(--text)">${card.label}</div><div style="font-size:10px;color:var(--text-muted)">${card.sub}</div></div><div style="text-align:center"><div style="font-size:28px;font-weight:800;font-family:'Inter',sans-serif;color:${gc}">${card.data.grade}%</div><div style="font-size:8px;color:var(--text-muted);text-transform:uppercase">Grade</div></div></div>`;
    card.data.kpis.forEach(k=>{
      const pct=k.goal>0?Math.min(Math.round(k.actual/k.goal*100),100):0;
      const bc=pct>=80?"#10B981":pct>=50?"#E8A838":"#EF4444";
      h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:10px;color:var(--text-muted);width:100px;flex-shrink:0">${k.label}</span><div style="flex:1;height:4px;background:var(--border-light);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${bc};border-radius:2px"></div></div><span style="font-size:10px;font-weight:700;color:var(--text);min-width:45px;text-align:right">${k.actual}/${k.goal}</span></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;

  // Conversion Funnel (historical)
  const totalCreated = all.length;
  const reachedUW = all.filter(d=>d.uwGeneratedDate||["underwriting","loi","loi_accepted"].includes(d.stage)).length;
  const reachedLOI = all.filter(d=>d.loiGeneratedDate||["loi","loi_accepted"].includes(d.stage)).length;
  const reachedDD = all.filter(d=>d.stage==="loi_accepted").length;
  const pToUW = totalCreated>0?Math.round(reachedUW/totalCreated*100):0;
  const uwToLOI = reachedUW>0?Math.round(reachedLOI/reachedUW*100):0;
  const loiToDD = reachedLOI>0?Math.round(reachedDD/reachedLOI*100):0;

  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">`;
  // Funnel
  h+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px"><div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px">Conversion Funnel (All Time)</div><div style="display:flex;align-items:center;gap:10px;justify-content:center">`;
  [{label:"All Deals",count:totalCreated,color:"#6366F1"},{label:"Underwriting",count:reachedUW,color:"#E8A838",rate:pToUW},{label:"LOI",count:reachedLOI,color:"#3B82F6",rate:uwToLOI},{label:"DD",count:reachedDD,color:"#0EA5E9",rate:loiToDD}].forEach((s,i)=>{
    if(i>0){const rc=s.rate>=50?"#10B981":s.rate>=25?"#E8A838":"#EF4444";h+=`<div style="display:flex;flex-direction:column;align-items:center"><span style="font-size:11px;font-weight:700;color:${rc}">${s.rate}%</span><span style="color:var(--text-muted);font-size:16px">→</span></div>`;}
    h+=`<div style="text-align:center"><div style="font-size:24px;font-weight:800;font-family:'Inter',sans-serif;color:${s.color}">${s.count}</div><div style="font-size:10px;color:var(--text-muted);font-weight:600">${s.label}</div></div>`;
  });
  h+=`</div></div>`;

  // Stage Velocity
  h+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px"><div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:16px">Stage Velocity (avg days in stage)</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">`;
  ["prospecting","underwriting","loi"].forEach(stageId=>{
    const inStage=active.filter(d=>d.stage===stageId&&d.stageChangedDate);
    const avg=inStage.length?Math.round(inStage.reduce((s,d)=>s+(Date.now()-d.stageChangedDate)/DAY,0)/inStage.length):null;
    const color=stageId==="prospecting"?"#6366F1":stageId==="underwriting"?"#E8A838":"#3B82F6";
    h+=`<div style="text-align:center;background:var(--bg);border-radius:8px;padding:14px"><div style="font-size:22px;font-weight:800;font-family:'Inter',sans-serif;color:${color}">${avg!==null?avg+"d":"—"}</div><div style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;margin-top:4px">${stageId}</div></div>`;
  });
  h+=`</div></div></div>`;

  // Deal Health + Stale Deals
  const flaggedDeals=active.filter(d=>getDealFlagsDash(d).length>0);
  const staleDeals=active.filter(d=>{const la=d.lastActivity||d.createdAt||0;return(Date.now()-la)>7*DAY;});

  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">`;
  // Flags
  h+=`<div style="background:var(--bg-card);border:1px solid ${flaggedDeals.length?'#FECACA':'var(--border)'};border-radius:12px;padding:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:14px;font-weight:700;color:${flaggedDeals.length?'#DC2626':'var(--text)'}">Deal Health Flags</div><span style="font-size:22px;font-weight:800;font-family:'Inter',sans-serif;color:${flaggedDeals.length?'#DC2626':'#10B981'}">${flaggedDeals.length}</span></div>`;
  if(flaggedDeals.length){h+=`<div style="max-height:200px;overflow-y:auto">`;flaggedDeals.forEach(d=>{const flags=getDealFlagsDash(d);const link=d.listingLink||d.costarLink||d.uwLink||"";h+=`<a ${link?`href="${esc(link)}" target="_blank"`:'href="#"'} style="display:block;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:11px;text-decoration:none;${link?'cursor:pointer':''}"><span style="font-weight:600;color:var(--text)">${esc(d.name)}</span><span style="color:var(--text-muted)"> — ${flags.map(f=>f.msg).join(", ")}</span></a>`;});h+=`</div>`;}
  else h+=`<div style="color:#10B981;font-size:13px;font-weight:600;padding:20px 0;text-align:center">All deals healthy ✓</div>`;
  h+=`</div>`;

  // Stale
  h+=`<div style="background:var(--bg-card);border:1px solid ${staleDeals.length?'#FDE68A':'var(--border)'};border-radius:12px;padding:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:14px;font-weight:700;color:${staleDeals.length?'#D97706':'var(--text)'}">Stale Deals (7+ days idle)</div><span style="font-size:22px;font-weight:800;font-family:'Inter',sans-serif;color:${staleDeals.length?'#D97706':'#10B981'}">${staleDeals.length}</span></div>`;
  if(staleDeals.length){h+=`<div style="max-height:200px;overflow-y:auto">`;staleDeals.forEach(d=>{const la=d.lastActivity||d.createdAt||0;const days=Math.floor((Date.now()-la)/DAY);const link=d.listingLink||d.costarLink||d.uwLink||"";h+=`<a ${link?`href="${esc(link)}" target="_blank"`:'href="#"'} style="display:block;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:11px;text-decoration:none;display:flex;justify-content:space-between;${link?'cursor:pointer':''}"><span style="font-weight:600;color:var(--text)">${esc(d.name)}</span><span style="color:#D97706;font-weight:600">${days}d idle</span></a>`;});h+=`</div>`;}
  else h+=`<div style="color:#10B981;font-size:13px;font-weight:600;padding:20px 0;text-align:center">No stale deals ✓</div>`;
  h+=`</div></div>`;

  // KPI Weekly History
  h+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px"><div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px">Weekly KPI History</div>`;
  h+=`<div id="kpi-history-container"><div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px">Loading history...</div></div></div>`;

  h+=`</div>`;
  return h;
}

function wireKPIEvents() {
  // Load KPI history from separate sheet
  const KPI_SHEET = "1x-6WAGl0qjBF4ZXEVMoQuVHDdurrspN7Ksg0wma6g0k";
  const container = document.getElementById("kpi-history-container");
  if (container) {
    fetch(SHEETS_BASE + "/" + KPI_SHEET + "/values/Sheet1", { headers: { "Authorization": "Bearer " + state.accessToken } })
    .then(r => r.json())
    .then(data => {
      if (!data.values || data.values.length < 2) { container.innerHTML = `<div style="text-align:center;color:var(--text-muted);font-size:12px;padding:20px">No history yet — snapshots save every Sunday at 11pm</div>`; return; }
      const headers = data.values[0];
      const rows = data.values.slice(1);
      let h = `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>`;
      headers.forEach(col => { h += `<th style="text-align:${col==='Week Of'?'left':'center'};padding:8px 10px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--border)">${col}</th>`; });
      h += `</tr></thead><tbody>`;
      rows.reverse().forEach(row => {
        const grade = parseInt(row[8]) || 0;
        const gc = grade >= 80 ? "#10B981" : grade >= 50 ? "#E8A838" : "#EF4444";
        h += `<tr>`;
        row.forEach((val, i) => {
          if (i === 0) h += `<td style="padding:6px 10px;border-bottom:1px solid var(--border-light);font-weight:600;color:var(--text)">${val}</td>`;
          else if (i === 8) h += `<td style="padding:6px 10px;border-bottom:1px solid var(--border-light);text-align:center;font-weight:700;color:${gc}">${val}</td>`;
          else h += `<td style="padding:6px 10px;border-bottom:1px solid var(--border-light);text-align:center;color:var(--text)">${val}</td>`;
        });
        h += `</tr>`;
      });
      h += `</tbody></table></div>`;
      container.innerHTML = h;
    })
    .catch(e => { container.innerHTML = `<div style="color:#EF4444;font-size:11px;padding:10px">Failed to load history</div>`; });
  }
}

// ---- INIT ----
function waitForGIS() {
  if (typeof google !== "undefined" && google.accounts) {
    initAuth();
    render();
  } else {
    setTimeout(waitForGIS, 100);
  }
}
waitForGIS();
