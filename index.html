<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg: #F5F5F7;
  --bg-card: #FFFFFF;
  --bg-dark: #1D1D1F;
  --bg-header: rgba(255,255,255,0.85);
  --text: #1D1D1F;
  --text-secondary: #6E6E73;
  --text-muted: #AEAEB2;
  --border: rgba(0,0,0,0.08);
  --border-light: rgba(0,0,0,0.04);
  --accent: #1D1D1F;
  --accent-blue: #0071E3;
  --radius: 12px;
  --radius-lg: 18px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);

  --prospecting: #5E5CE6;
  --underwriting: #FF9F0A;
  --loi: #0071E3;
  --loi-accepted: #32ADE6;
  --psa: #BF5AF2;
  --closed: #34C759;
  --dead: #AEAEB2;

  --pri-high: #FF3B30;
  --pri-med: #FF9F0A;
  --pri-low: #AEAEB2;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  letter-spacing: -0.01em;
}

/* ---- LOGIN ---- */
.login-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 20px;
  background: var(--bg);
}
.login-container h1 {
  font-size: 48px;
  font-weight: 700;
  color: var(--bg-dark);
  letter-spacing: -2px;
  line-height: 1;
}
.login-container p { color: var(--text-secondary); font-size: 17px; font-weight: 400; }
.login-btn {
  margin-top: 8px;
  padding: 14px 36px;
  background: var(--bg-dark);
  color: #fff;
  border: none;
  border-radius: 980px;
  font-size: 15px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: -0.01em;
}
.login-btn:hover { background: #2D2D2F; transform: scale(1.01); box-shadow: var(--shadow-md); }
.login-note { font-size: 12px; color: var(--text-muted); }

/* ---- HEADER ---- */
.header {
  background: var(--bg-header);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1440px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
}
.header-left { display: flex; align-items: center; gap: 28px; }
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--bg-dark);
  letter-spacing: -0.5px;
}
.header-right { display: flex; align-items: center; gap: 10px; }

/* ---- VIEW TOGGLE ---- */
.view-toggle {
  display: flex;
  background: rgba(0,0,0,0.05);
  border-radius: 8px;
  padding: 2px;
  gap: 1px;
}
.view-btn {
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  color: var(--text-secondary);
  background: transparent;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: -0.01em;
}
.view-btn.active {
  background: #fff;
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.view-btn:hover:not(.active) { color: var(--text); }

/* ---- SEARCH ---- */
.search-input {
  padding: 7px 14px 7px 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  width: 220px;
  outline: none;
  background: rgba(255,255,255,0.8);
  transition: all 0.15s;
  letter-spacing: -0.01em;
}
.search-input:focus { background: #fff; border-color: rgba(0,0,0,0.15); box-shadow: var(--shadow-sm); }
.search-input::placeholder { color: var(--text-muted); }

/* ---- STATS BAR ---- */
.stats-bar {
  max-width: 1440px;
  margin: 24px auto 0;
  padding: 0 40px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.stat-card {
  background: var(--bg-card);
  border: none;
  border-radius: var(--radius);
  padding: 16px 20px;
  flex: 1;
  min-width: 130px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
}
.stat-card:hover { box-shadow: var(--shadow-md); }
.stat-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0;
  margin-bottom: 6px;
}
.stat-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--bg-dark);
  letter-spacing: -1px;
  line-height: 1;
}
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 400; }

/* ---- MAIN CONTENT ---- */
.main {
  max-width: 1440px;
  margin: 20px auto 60px;
  padding: 0 40px;
}

/* ---- KANBAN ---- */
.kanban {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 24px;
}
.kanban::-webkit-scrollbar { height: 4px; }
.kanban::-webkit-scrollbar-track { background: transparent; }
.kanban::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

.kanban-col {
  min-width: 256px;
  max-width: 290px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.kanban-col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px;
  margin-bottom: 10px;
}
.kanban-col-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.kanban-col-count {
  font-size: 11px;
  font-weight: 500;
  padding: 1px 7px;
  border-radius: 20px;
  background: rgba(0,0,0,0.06);
  color: var(--text-secondary);
}
.kanban-cards { display: flex; flex-direction: column; gap: 8px; flex: 1; }

.k-card {
  background: var(--bg-card);
  border: none;
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}
.k-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.k-card-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  line-height: 1.35;
  letter-spacing: -0.2px;
}
.k-card-address {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 10px;
  font-weight: 400;
}
.k-card-metrics {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.k-metric {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}
.k-metric strong { color: var(--text); font-weight: 600; }
.k-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border-light);
}
.k-priority {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0;
}
.k-score {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
}
.k-links { display: flex; gap: 4px; margin-top: 8px; }
.k-link-pill {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 20px;
  text-decoration: none;
  transition: opacity 0.15s;
}
.k-link-pill:hover { opacity: 0.75; }

/* ---- TABLE ---- */
.table-container {
  background: var(--bg-card);
  border: none;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  position: sticky;
  top: 0;
  background: rgba(245,245,247,0.9);
  backdrop-filter: blur(8px);
  padding: 11px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border);
}
thead th:hover { color: var(--text); }
thead th .sort-arrow { font-size: 9px; margin-left: 4px; }
tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(0,0,0,0.015); }
tbody td { padding: 11px 16px; white-space: nowrap; color: var(--text); font-weight: 400; }
.td-name { font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
.td-address { color: var(--text-secondary); max-width: 220px; overflow: hidden; text-overflow: ellipsis; font-weight: 400; }
.stage-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0;
}
.pri-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
}
.td-link {
  color: var(--accent-blue);
  text-decoration: none;
  font-weight: 500;
  font-size: 11px;
}
.td-link:hover { text-decoration: underline; }
.td-score {
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
}

/* ---- MODAL (legacy, kept for safety) ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  width: 560px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease;
}
.modal-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.modal-header h2 { font-size: 20px; font-weight: 700; color: var(--bg-dark); letter-spacing: -0.5px; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px 8px; }
.modal-body { padding: 20px 28px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.modal-metric { background: var(--bg); border-radius: var(--radius); padding: 12px; text-align: center; }
.modal-metric-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0; margin-bottom: 4px; font-weight: 500; }
.modal-metric-value { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.modal-section { margin-bottom: 16px; }
.modal-section-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0; margin-bottom: 6px; text-transform: uppercase; }
.modal-info { background: var(--bg); border-radius: var(--radius); padding: 12px 14px; font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.modal-links { display: flex; gap: 8px; flex-wrap: wrap; }
.modal-link-pill { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; font-size: 11px; font-weight: 500; border-radius: 20px; text-decoration: none; transition: opacity 0.15s; }
.modal-link-pill:hover { opacity: 0.75; }

/* ---- EMPTY / LOADING ---- */
.empty { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.empty h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); letter-spacing: -0.3px; }
.empty p { font-size: 14px; font-weight: 400; }
.loading { text-align: center; padding: 80px; color: var(--text-muted); font-size: 14px; }

/* ---- ANIMATIONS ---- */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* ---- STAGE FILTER ---- */
.stage-filter {
  max-width: 1440px;
  margin: 16px auto 0;
  padding: 0 40px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* ---- RESPONSIVE ---- */
@media (max-width: 768px) {
  .stats-bar { flex-direction: column; }
  .kanban-col { min-width: 240px; }
  .header { padding: 0 20px; }
  .main { padding: 0 20px; }
  .stats-bar { padding: 0 20px; }
  .search-input { width: 160px; }
}
</style>
</head>
<body>

<div id="app"></div>

<script src="dashboard.js"></script>
</body>
</html>
