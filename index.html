    if (comps === null) return ring(null, label, "Sync UW");
    if (comps && comps.partial) {
      const count = comps.count;
      const pct = count / 3;
      const filled = pct * CIRC;
      const rem = CIRC - filled;
      const color = "#E8A838";
      return `<div style="text-align:center;flex:1">
        <svg width="70" height="70" viewBox="0 0 70 70">
          <circle cx="35" cy="35" r="28" fill="none" stroke="#E2E8F0" stroke-width="5"/>
          <circle cx="35" cy="35" r="28" fill="none" stroke="${color}" stroke-width="5"
            stroke-dasharray="${filled.toFixed(1)} ${rem.toFixed(1)}" stroke-dashoffset="44" stroke-linecap="round"
            transform="rotate(-90 35 35)"/>
          <text x="35" y="37" text-anchor="middle" font-size="12" font-weight="800" fill="${color}" font-family="Inter,sans-serif">${count}/3</text>
        </svg>
        <div style="font-size:10px;font-weight:600;color:var(--text-secondary);margin-top:2px">${label}</div>
        <div style="font-size:9px;color:var(--text-muted)">Need ${3 - count} more</div>
      </div>`;
    }
    return ring(comps, label, "Sync UW");
  }
  const phys = calcPhysicalScore(d);
  const comps = calcCompsScore(d);
  const fin = calcFinancialScore(d);
  const credit = calcTenantCreditScore(tenants);
  const lease = calcLeaseRiskScore(tenants, d.walt);
  // Only include comps in overall if it's a real score (not partial)
  const compsForOverall = (comps !== null && typeof comps === "number") ? comps : null;
  const scores = [phys, compsForOverall, fin, credit, lease].filter(s => s !== null);
  const overall = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*10)/10 : null;
  const ovColor = !overall ? "#CBD5E1" : overall >= 8 ? "#10B981" : overall >= 5 ? "#E8A838" : "#EF4444";
  const ovFilled = overall ? (overall/10)*CIRC : 0;
  return `<div id="deal-scorecard" style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px">
    <div style="font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px">Deal Analysis Scorecard</div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      ${ring(phys,"Physical","No Data")}
      ${compsRing(comps,"Comps")}
      ${ring(fin,"Financial","No NOI")}
      ${ring(credit,"Tenant Credit","Sync UW")}
      ${ring(lease,"Lease Risk","No Tenants")}
      <div style="width:1px;height:60px;background:var(--border);margin:0 8px"></div>
      <div style="text-align:center;flex:1">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="32" fill="none" stroke="#E2E8F0" stroke-width="6"/>
          <circle cx="40" cy="40" r="32" fill="none" stroke="${ovColor}" stroke-width="6"
            stroke-dasharray="${ovFilled.toFixed(1)} ${(CIRC-ovFilled).toFixed(1)}" stroke-dashoffset="50" stroke-linecap="round"
            transform="rotate(-90 40 40)"/>
          <text x="40" y="45" text-anchor="middle" font-size="18" font-weight="800" fill="${ovColor}" font-family="Inter,sans-serif">${overall ?? "–"}</text>
        </svg>
        <div style="font-size:11px;font-weight:700;color:var(--text-secondary);margin-top:2px">Overall</div>
      </div>
    </div>
  </div>`;
}

// ---- DEAL ANALYSIS SUMMARY ----
function renderDealSummary(d, tenants) {
  if (!state.dealDetailSynced && !d.propertyCondition) return "";

  const now = Date.now();
  const DAY = 864e5;
  const marketRent = parseFloat(d.marketRent) || 0;
  const askingPrice = parseFloat(d.askingPrice) || 0;
  const proFormaNoi = state.dealDetailProFormaNoi || 0;
  const proFormaCap = askingPrice > 0 && proFormaNoi > 0 ? (proFormaNoi / askingPrice * 100).toFixed(1) : null;
  const currentCap = parseFloat(d.capRate) || 0;
  const activeTenants = (tenants || []).filter(t => !t.isVacant);
  const vacantTenants = (tenants || []).filter(t => t.isVacant);
  const totalGLA = (tenants || []).reduce((s, t) => s + (t.sqft || 0), 0);
  const totalGrossRent = activeTenants.reduce((s, t) => s + (t.annualRent || 0), 0);
  const usefulLife = { roof: 25, hvac: 20, parking: 25 };

  function adjMarket(sqft) {
    if (!marketRent) return 0;
    if (sqft < 1500) return marketRent * 0.8;
    if (sqft < 5000) return marketRent * 0.7;
    if (sqft < 10000) return marketRent * 0.6;
    return marketRent * 0.5;
  }

  const paragraphs = [];
  const improvements = [];

  // ---- PHYSICAL ----
  if (d.propertyCondition) {
    const phys = calcPhysicalScore(d);
    let parts = [`Overall condition is <strong>${d.propertyCondition}</strong>.`];

    ["roof","hvac","parking"].forEach(sys => {
      const condField = sys + "Condition";
      const ageField = sys + "Age";
      const life = usefulLife[sys];
      const cond = d[condField];
      const age = parseFloat(d[ageField]) || 0;
      if (cond || age) {
        const pctUsed = age ? Math.round(age / life * 100) : null;
        const pctLeft = pctUsed !== null ? 100 - pctUsed : null;
        let txt = sys.charAt(0).toUpperCase() + sys.slice(1);
        if (cond) txt += ` is <strong>${cond}</strong>`;
        if (pctLeft !== null) txt += ` (${pctLeft}% of useful life remaining)`;
        parts.push(txt + ".");
        if (pctLeft !== null && pctLeft < 25) improvements.push(`${sys.charAt(0).toUpperCase()+sys.slice(1)} is near end of useful life — budget for replacement or negotiate seller credit.`);
      }
    });
    if (d.deferredMaint > 0) { parts.push(`Deferred maintenance of <strong>$${Number(d.deferredMaint).toLocaleString()}</strong> noted.`); if (d.deferredMaint > 50000) improvements.push("Deferred maintenance exceeds $50K — negotiate a price reduction or escrow credit at close."); }
    if (d.envConcerns) { parts.push(`Environmental concern noted: <strong>${esc(d.envConcerns)}</strong>.`); improvements.push("Resolve environmental concerns — order Phase I before LOI if not done."); }

    paragraphs.push({ label: "Physical", score: phys, text: parts.join(" ") });
  }

  // ---- COMPS ----
  if (state.dealDetailSynced) {
    const compsCount = state.dealDetailComps.length;
    const comps = calcCompsScore(d);
    if (compsCount < 3) {
      paragraphs.push({ label: "Comps", score: null, text: `Only <strong>${compsCount}/3</strong> comps loaded. Minimum 3 required for a reliable market comparison. ${compsCount === 0 ? "No comps have been added to the UW yet." : `Need ${3 - compsCount} more comp${3-compsCount>1?"s":""}.`}` });
      improvements.push(`Add ${3 - compsCount} more comp${3-compsCount>1?"s":""} to the Call to Brokers tab in the UW to complete market analysis.`);
    } else {
      paragraphs.push({ label: "Comps", score: typeof comps === "number" ? comps : null, text: `<strong>${compsCount} comp${compsCount>1?"s":""}</strong> loaded from UW. ${compsCount >= 5 ? "Strong comp set — market pricing well supported." : compsCount >= 3 ? "Adequate comp coverage." : ""}` });
      if (compsCount < 5) improvements.push("Adding more comps (5+) would strengthen market pricing confidence.");
    }
  }

  // ---- FINANCIAL ----
  if (state.dealDetailSynced) {
    const fin = calcFinancialScore(d);
    let parts = [];
    if (currentCap) parts.push(`Current cap rate is <strong>${currentCap}%</strong> — ${currentCap >= 8 ? "strong going-in yield" : currentCap >= 6 ? "acceptable going-in yield" : "below typical threshold, deal depends on pro forma"}.`);
    if (proFormaCap) {
      const spread = (parseFloat(proFormaCap) - currentCap).toFixed(1);
      parts.push(`Pro forma cap is <strong>${proFormaCap}%</strong> (${spread > 0 ? "+" : ""}${spread}% spread).`);
      if (spread >= 5) parts.push("Significant value-add opportunity.");
      else if (spread >= 3) parts.push("Moderate upside.");
      else if (spread > 0) parts.push("Limited spread — closer to stabilized pricing.");
    }
    const maxVacantSf = vacantTenants.length ? Math.max(...vacantTenants.map(t => t.sqft || 0)) : 0;
    if (maxVacantSf > 0) {
      const achievability = maxVacantSf > 10000 ? 25 : maxVacantSf > 5000 ? 50 : maxVacantSf > 1500 ? 70 : 90;
      parts.push(`Pro forma achievability is <strong>${achievability}%</strong> based on largest vacant suite (${fmtNum(maxVacantSf)} SF).`);
      if (achievability <= 25) improvements.push(`${fmtNum(maxVacantSf)} SF vacancy is a major execution risk — securing a tenant LOI before close would dramatically improve the financial score.`);
      else if (achievability <= 50) improvements.push(`${fmtNum(maxVacantSf)} SF vacancy is hard to lease — confirm tenant demand before proceeding.`);
    } else if (state.dealDetailSynced) {
      parts.push("Property is fully occupied — pro forma upside driven by rent growth and lease renewals.");
    }
    if (!proFormaCap && state.dealDetailSynced) { parts.push("Pro forma NOI not yet populated in UW."); improvements.push("Complete the Expenses tab in UW to generate a pro forma cap rate."); }
    if (parts.length) paragraphs.push({ label: "Financial", score: fin, text: parts.join(" ") });
  }

  // ---- TENANT CREDIT ----
  if (activeTenants.length) {
    const credit = calcTenantCreditScore(tenants);
    const creditMap = { national:"National", regional:"Regional", local:"Local", "mom & pop":"Mom & Pop" };
    const nationals = activeTenants.filter(t => (t.creditType||"").toLowerCase() === "national");
    const momPops = activeTenants.filter(t => (t.creditType||"").toLowerCase().includes("mom"));
    let parts = [];
    if (nationals.length) parts.push(`<strong>${nationals.length}</strong> national credit tenant${nationals.length>1?"s":""} (${nationals.map(t=>esc(t.name)).join(", ")}).`);
    if (momPops.length) parts.push(`<strong>${momPops.length}</strong> mom & pop tenant${momPops.length>1?"s":""} — higher renewal uncertainty.`);
    const unrated = activeTenants.filter(t => !t.creditType);
    if (unrated.length) { parts.push(`<strong>${unrated.length}</strong> tenant${unrated.length>1?"s":""} missing credit type.`); improvements.push("Set credit type (National/Regional/Local/Mom & Pop) for all tenants in Rent Roll column A to complete tenant credit scoring."); }
    if (parts.length) paragraphs.push({ label: "Tenant Credit", score: credit, text: parts.join(" ") });
  }

  // ---- LEASE RISK ----
  if (activeTenants.length || vacantTenants.length) {
    const lease = calcLeaseRiskScore(tenants, d.walt);
    const parts = [];
    const flags = [];

    // Concentration flags
    activeTenants.forEach(t => {
      const revPct = totalGrossRent > 0 ? t.annualRent / totalGrossRent : 0;
      if (revPct >= 0.30) { flags.push(`<strong>${esc(t.name)}</strong> represents <strong>${Math.round(revPct*100)}%</strong> of gross revenue — high concentration risk.`); improvements.push(`${esc(t.name)} is at ${Math.round(revPct*100)}% revenue concentration. Secure a long-term renewal before close.`); }
      else if (activeTenants.length > 4 && revPct >= 0.20) flags.push(`<strong>${esc(t.name)}</strong> at <strong>${Math.round(revPct*100)}%</strong> of revenue — watch concentration.`);
    });

    // Expiring tenants
    activeTenants.filter(t => !t.isMTM && t.leaseEnd).forEach(t => {
      const monthsLeft = (new Date(t.leaseEnd+"T00:00:00").getTime() - now) / (30 * DAY);
      const adj = adjMarket(t.sqft);
      const aboveMarket = adj > 0 && t.rentPerSf > adj;
      if (monthsLeft <= 6) {
        flags.push(`<strong>${esc(t.name)}</strong> expires in <strong>${Math.round(monthsLeft)} months</strong> — urgent. ${aboveMarket ? "Paying above market, replacement risk." : "Below market, renewal opportunity."}`);
        if (aboveMarket) improvements.push(`${esc(t.name)} expires in ${Math.round(monthsLeft)} months above market — critical to address before close.`);
      } else if (monthsLeft <= 18) {
        flags.push(`<strong>${esc(t.name)}</strong> expires in <strong>${Math.round(monthsLeft)} months</strong>. ${aboveMarket ? "Above market." : "Below market."}`);
        if (aboveMarket) improvements.push(`${esc(t.name)} expires in ${Math.round(monthsLeft)} months above market — request estoppel and discuss renewal.`);
      }
    });

    // MTM tenants
    activeTenants.filter(t => t.isMTM || (t.leaseEnd||"").toUpperCase()==="MTM").forEach(t => {
      const tenure = t.leaseStart ? (now - new Date(t.leaseStart+"T00:00:00").getTime()) / (365 * DAY) : 0;
      if (tenure < 2) { flags.push(`<strong>${esc(t.name)}</strong> is MTM with only <strong>${Math.round(tenure*12)} months</strong> tenure — high risk.`); improvements.push(`${esc(t.name)} is MTM with short tenure — negotiate a minimum 3yr lease before close.`); }
      else if (tenure >= 5) flags.push(`<strong>${esc(t.name)}</strong> is MTM but has <strong>${Math.floor(tenure)} years</strong> tenure — established tenant, lower risk.`);
    });

    // Vacancy
    vacantTenants.forEach(t => {
      flags.push(`<strong>${fmtNum(t.sqft)} SF</strong> vacant${t.suite ? " (Suite "+esc(t.suite)+")" : ""}. ${t.sqft > 10000 ? "Large vacancy — major leasing risk." : t.sqft > 5000 ? "Mid-size vacancy — will take time to fill." : "Small suite — should lease quickly."}`);
      if (t.sqft > 5000) improvements.push(`${fmtNum(t.sqft)} SF vacancy — get a tenant LOI or letter of intent before close to de-risk.`);
    });

    if (flags.length) parts.push(flags.join(" "));
    else parts.push("No significant lease risk flags.");
    paragraphs.push({ label: "Lease Risk", score: lease, text: parts.join(" ") });
  }

  if (!paragraphs.length) return "";

  // Score color helper
  function sColor(s) { return s === null ? "#94A3B8" : s >= 8 ? "#10B981" : s >= 5 ? "#E8A838" : "#EF4444"; }

  let h = `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px">
    <div style="font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px">Deal Analysis Summary</div>`;

  paragraphs.forEach(p => {
    const sc = p.score !== null && p.score !== undefined;
    h += `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border-light)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:12px;font-weight:700;color:var(--text)">${p.label}</span>
        ${sc ? `<span style="font-size:11px;font-weight:700;color:${sColor(p.score)};background:${sColor(p.score)}15;padding:2px 8px;border-radius:4px">${p.score}/10</span>` : `<span style="font-size:11px;color:var(--text-muted)">No Score</span>`}
      </div>
      <div style="font-size:12px;color:var(--text-secondary);line-height:1.7">${p.text}</div>
    </div>`;
  });

  // Improvements
  if (improvements.length) {
    h += `<div style="margin-top:4px">
      <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">💡 How to improve this deal</div>`;
    improvements.forEach(imp => {
      h += `<div style="display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:var(--text-secondary);line-height:1.5">
        <span style="color:#F59E0B;margin-top:1px">→</span>
        <span>${imp}</span>
      </div>`;
    });
    h += `</div>`;
  }

  h += `</div>`;
  return h;
}

// ---- FINANCIAL ANALYSIS ENGINE ----

// IRR solver (Newton-Raphson)
function calcIRR(cashflows) {
  if (!cashflows || cashflows.length < 2) return null;
  let rate = 0.1;
  for (let i = 0; i < 100; i++) {
    let npv = 0, dnpv = 0;
    cashflows.forEach((cf, t) => {
      const d = Math.pow(1 + rate, t);
      npv += cf / d;
      dnpv -= t * cf / (d * (1 + rate));
    });
    if (Math.abs(npv) < 0.01) break;
    if (dnpv === 0) break;
    rate -= npv / dnpv;
    if (rate < -0.99) rate = -0.99;
  }
  return isFinite(rate) ? rate * 100 : null;
}

// Remaining loan balance after N months
function loanBalance(principal, annualRate, totalYears, monthsPaid) {
  const r = annualRate / 100 / 12;
  const n = totalYears * 12;
  if (r === 0) return principal * (1 - monthsPaid / n);
  return principal * (Math.pow(1+r, n) - Math.pow(1+r, monthsPaid)) / (Math.pow(1+r, n) - 1);
}

// Monthly mortgage payment
function monthlyPmt(principal, annualRate, years) {
  const r = annualRate / 100 / 12;
  const n = years * 12;
  if (r === 0) return principal / n;
  return principal * (r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1);
}

// Adjusted market rent by suite size
function adjMarketRent(marketRent, sqft) {
  if (!marketRent) return 0;
  if (sqft < 1500) return marketRent * 0.8;
  if (sqft < 5000) return marketRent * 0.7;
  if (sqft < 10000) return marketRent * 0.6;
  return marketRent * 0.5;
}

// Vacancy months by suite size
function vacancyMonths(sqft) {
  if (sqft < 1500) return 6;
  if (sqft < 5000) return 9;
  if (sqft < 10000) return 12;
  return 18;
}

// Build month-level TILC cashflow model
// Returns array of 48 monthly net cashflows (operating only, no debt service, no acquisition)
// Parse lease date string → {year, month} or null. Handles YYYY-MM-DD and M/D/YYYY.
function parseLeaseDate(str) {
  if (!str) return null;
  const s = str.toString().trim();
  if (s.toUpperCase() === "MTM") return null;
  // YYYY-MM-DD
  const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return { year: parseInt(iso[1]), month: parseInt(iso[2]) - 1 };
  // M/D/YYYY or MM/DD/YYYY
  const slash = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (slash) return { year: parseInt(slash[3]), month: parseInt(slash[1]) - 1 };
  return null;
}

function buildTILCModel(tenants, marketRent, acqDate, proFormaExpenses, totalSqft) {
  const MONTHS = 48;
  if (!acqDate) acqDate = new Date();

  // Per SF expenses for NNN conversion
  const expPerSf = (proFormaExpenses > 0 && totalSqft > 0) ? proFormaExpenses / totalSqft : 0;

  // Per-month arrays — all separate
  const baseRent     = new Array(MONTHS).fill(0);
  const recoveryRent = new Array(MONTHS).fill(0);
  const freeRentLoss = new Array(MONTHS).fill(0);
  const vacancyLoss  = new Array(MONTHS).fill(0);
  const tiCosts      = new Array(MONTHS).fill(0);
  const lcCosts      = new Array(MONTHS).fill(0);
  const tenantProforma = [];
  const tilcEvents = [];

  tenants.forEach(t => {
    if (!t.sqft) return;
    const adjMR = adjMarketRent(marketRent, t.sqft);
    const monthlyBase = (t.annualRent || 0) / 12;
    const monthlyRec  = (t.annualRecovery || 0) / 12;
    const rentPerSf   = t.rentPerSf || 0;

    // NNN new lease: base = adjMR - expPerSf, recovery = expPerSf * sqft
    const nnnBasePsf = Math.max(0, adjMR - expPerSf);
    const nnnAnnualBase = nnnBasePsf * t.sqft;
    const nnnAnnualRecovery = expPerSf * t.sqft;

    // 4% escalation helper — monthly base rent at month M of new lease
    function escalatedMonthlyBase(monthsIntoLease) {
      const year = Math.floor(monthsIntoLease / 12);
      return (nnnAnnualBase * Math.pow(1.04, year)) / 12;
    }

    // Weighted expected values (deterministic 75/25)
    const expFreeRentMo = Math.round(0.75 * 2);
    const expVacMo      = Math.round(0.25 * vacancyMonths(t.sqft));
    const expTI         = ((0.75 * 10) + (0.25 * 25)) * t.sqft;
    const expLC         = ((0.75 * 0.04) + (0.25 * 0.06)) * nnnBasePsf * t.sqft * 5;

    // Determine lease end month
    let leaseEndMonth = MONTHS;
    if (t.isVacant) {
      leaseEndMonth = 0;
    } else if (t.isMTM) {
      const pctOfMarket = adjMR > 0 ? rentPerSf / adjMR : 1;
      leaseEndMonth = pctOfMarket < 0.5 ? 0 : 12;
    } else if (t.leaseEnd) {
      // Parse month+year only — handle YYYY-MM-DD and M/D/YYYY, clamp invalid days
      const leEnd = parseLeaseDate(t.leaseEnd);
      if (leEnd) {
        const mDiff = (leEnd.year - acqDate.getFullYear()) * 12
                    + (leEnd.month - acqDate.getMonth());
        leaseEndMonth = Math.max(0, Math.min(MONTHS, mDiff));
      }
    }

    // Phase 1: income during active existing lease (keep original gross rent as-is)
    for (let m = 0; m < Math.min(leaseEndMonth, MONTHS); m++) {
      baseRent[m]     += monthlyBase;
      recoveryRent[m] += monthlyRec;
    }

    // Phase 2: lease event at expiry
    if (leaseEndMonth < MONTHS || t.isVacant) {
      const costMonth = Math.min(leaseEndMonth, MONTHS - 1);
      tiCosts[costMonth] += expTI;
      lcCosts[costMonth] += expLC;

      // Phase 3: free rent (recovery only, no base)
      const freeStart = leaseEndMonth;
      const freeEnd   = Math.min(freeStart + expFreeRentMo, MONTHS);
      for (let m = freeStart; m < freeEnd; m++) {
        recoveryRent[m] += nnnAnnualRecovery / 12;
        freeRentLoss[m] += escalatedMonthlyBase(0);
      }

      // Phase 4: vacancy
      const vacStart = freeEnd;
      const vacEnd   = Math.min(vacStart + expVacMo, MONTHS);
      for (let m = vacStart; m < vacEnd; m++) {
        vacancyLoss[m] += escalatedMonthlyBase(0) + nnnAnnualRecovery / 12;
      }

      // Phase 5: new NNN lease with 4% annual escalation
      const newLeaseStart = t.isVacant ? expVacMo : Math.min(freeEnd + expVacMo, MONTHS);
      for (let m = newLeaseStart; m < MONTHS; m++) {
        const monthsIntoLease = m - newLeaseStart;
        baseRent[m]     += escalatedMonthlyBase(monthsIntoLease);
        recoveryRent[m] += nnnAnnualRecovery / 12;
      }

      tilcEvents.push({
        month: leaseEndMonth, tenant: t.name, suite: t.suite, sqft: t.sqft,
        ti: expTI, lc: expLC, freeRentMo: expFreeRentMo, vacMo: expVacMo,
        newRentPsf: nnnBasePsf, newRecoveryPsf: expPerSf, newLeaseStart
      });
    }

    // Per-year status for pro forma rent roll
    const yearStatus = [];
    for (let yr = 0; yr < 4; yr++) {
      const midMonth = yr * 12 + 6;
      let status, rentPsf, recPsf;
      if (t.isVacant && midMonth < expVacMo) {
        status = "Vacant"; rentPsf = 0; recPsf = 0;
      } else if (!t.isVacant && midMonth < leaseEndMonth) {
        status = "Active"; rentPsf = rentPerSf; recPsf = (t.annualRecovery||0) / t.sqft;
      } else if (midMonth < leaseEndMonth + expFreeRentMo) {
        status = "Free Rent"; rentPsf = 0; recPsf = expPerSf;
      } else if (midMonth < leaseEndMonth + expFreeRentMo + expVacMo) {
        status = "Vacant"; rentPsf = 0; recPsf = 0;
      } else {
        const newLeaseStart = t.isVacant ? expVacMo : leaseEndMonth + expFreeRentMo + expVacMo;
        const monthsIn = midMonth - newLeaseStart;
        const yearIn = Math.max(0, Math.floor(monthsIn / 12));
        status = "New Tenant (NNN)";
        rentPsf = nnnBasePsf * Math.pow(1.04, yearIn);
        recPsf = expPerSf;
      }
      yearStatus.push({ status, rentPsf: Math.round(rentPsf * 100)/100, recPsf: Math.round(recPsf * 100)/100 });
    }
    tenantProforma.push({
      name: t.name, suite: t.suite, sqft: t.sqft, isVacant: t.isVacant,
      leaseEnd: t.leaseEnd, isMTM: t.isMTM,
      currentRentPsf: rentPerSf, adjMarketRentPsf: adjMR, nnnBasePsf, expPerSf,
      yearStatus
    });
  });

  // Roll up to annual
  const annual = Array.from({length:4}, () => ({
    baseRent:0, recoveryRent:0, freeRentLoss:0, vacancyLoss:0, tiCosts:0, lcCosts:0
  }));
  for (let m = 0; m < MONTHS; m++) {
    const yr = Math.floor(m / 12);
    annual[yr].baseRent     += baseRent[m];
    annual[yr].recoveryRent += recoveryRent[m];
    annual[yr].freeRentLoss += freeRentLoss[m];
    annual[yr].vacancyLoss  += vacancyLoss[m];
    annual[yr].tiCosts      += tiCosts[m];
    annual[yr].lcCosts      += lcCosts[m];
  }
  annual.forEach(yr => {
    yr.grossIncome    = yr.baseRent + yr.recoveryRent - yr.freeRentLoss - yr.vacancyLoss;
    yr.netOperatingCF = yr.grossIncome - yr.tiCosts - yr.lcCosts;
  });

  return { annual, annualCF: annual.map(yr => yr.netOperatingCF), tilcEvents, tenantProforma };
}

// Solve target price for 100% ROI
function solveTargetPrice100(noi, exitCap, rate, amortYears, downPct, tilcModel) {
  function calcROIAtPrice(price) {
    const down = price * downPct / 100;
    const loan = price - down;
    const closingCosts = (loan * 0.01) + 25000;
    const totalEquity = down + closingCosts;
    const pmt = monthlyPmt(loan, rate, amortYears);
    const annualDS = pmt * 12;
    const exitValue = noi / (exitCap / 100);
    const loanPayoff = loanBalance(loan, rate, amortYears, 48);
    // 4-year cashflows: Year 1 includes acquisition outlay
    const cfs = tilcModel.annualCF.map((cf, i) => cf - annualDS);
    const totalOperatingCF = cfs.reduce((a, b) => a + b, 0);
    const netExit = exitValue - loanPayoff;
    const profit = totalOperatingCF + netExit - totalEquity;
    return { roi: totalEquity > 0 ? (profit / totalEquity) * 100 : 0, profit, totalEquity, netExit, totalOperatingCF, exitValue, down, closingCosts, annualDS, loanPayoff };
  }
  let lo = 1000, hi = noi * 150;
  for (let i = 0; i < 150; i++) {
    const mid = (lo + hi) / 2;
    const { roi } = calcROIAtPrice(mid);
    if (Math.abs(roi - 100) < 0.01) return { price: mid, ...calcROIAtPrice(mid) };
    if (roi < 100) hi = mid; else lo = mid;
  }
  return { price: (lo + hi) / 2, ...calcROIAtPrice((lo + hi) / 2) };
}

function renderFinancialAnalysis(d) {
  if (!state.dealDetailSynced) return `<div style="background:var(--bg-card);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;box-shadow:var(--shadow-sm)">
    <div style="font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px;letter-spacing:-0.3px">Financial Analysis</div>
    <div style="font-size:13px;color:var(--text-muted)">Sync UW to run financial analysis.</div>
  </div>`;

  const noi = state.dealDetailProFormaNoi;
  const proFormaExpenses = state.dealDetailProFormaExpenses || 0;
  const { rate, amortYears, downPct, exitCap } = state.dealDetailLoanData;
  const tenants = state.dealDetailTenants;
  const marketRent = parseFloat(d.marketRent) || 0;
  const askingPrice = parseFloat(d.askingPrice) || 0;
  const sqft = parseFloat(d.sqft) || 0;
  const acqDate = state.dealDetailAcqDate || new Date();
  const equityIn = state.dealDetailEquityIn;
  const irrCFs = state.dealDetailIRRCashflows;
  const activeTab = state.dealDetailFinTab || "overview";

  const tilcModel = buildTILCModel(tenants, marketRent, acqDate, proFormaExpenses, sqft);

  // Financial metrics
  const exitValue = noi && exitCap ? noi / (exitCap / 100) : 0;
  const profit = irrCFs.length ? irrCFs.reduce((a,b) => a+b, 0) : 0;
  const roi = equityIn > 0 ? (profit / equityIn * 100) : 0;
  const irr = irrCFs.length >= 2 ? calcIRR(irrCFs) : null;

  // Target price solve
  const missing = !noi || !rate || !amortYears || !downPct || !exitCap;
  let targetData = null;
  if (!missing) targetData = solveTargetPrice100(noi, exitCap, rate, amortYears, downPct, tilcModel);

  // Asking price metrics
  let askingMetrics = null;
  if (!missing && askingPrice) {
    const down = askingPrice * downPct / 100;
    const loan = askingPrice - down;
    const closingCosts = (loan * 0.01) + 25000;
    const totalEquity = down + closingCosts;
    const pmt = monthlyPmt(loan, rate, amortYears);
    const annualDS = pmt * 12;
    const loanPayoff = loanBalance(loan, rate, amortYears, 48);
    const netExit = exitValue - loanPayoff;
    const totalOperatingCF = tilcModel.annualCF.reduce((a,b) => a+b, 0) - annualDS * 4;
    const askProfit = totalOperatingCF + netExit - totalEquity;
    askingMetrics = { roi: totalEquity > 0 ? askProfit/totalEquity*100 : 0, profit: askProfit, totalEquity, netExit, down, closingCosts, annualDS, loanPayoff, annualCF: tilcModel.annualCF.map(cf => cf - annualDS) };
  }

  const roiColor = roi >= 100 ? "#34C759" : roi >= 50 ? "#FF9F0A" : "#FF3B30";
  const askRoiColor = askingMetrics ? (askingMetrics.roi >= 100 ? "#34C759" : askingMetrics.roi >= 50 ? "#FF9F0A" : "#FF3B30") : "#AEAEB2";

  // Tab content
  function tabBtn(id, label) {
    const active = activeTab === id;
    return `<button onclick="state.dealDetailFinTab='${id}';document.getElementById('deal-how-to-counter').innerHTML=renderFinancialAnalysis(state.deals.find(x=>x.id===state.selectedDealDetail))" style="padding:6px 16px;border-radius:20px;font-size:12px;cursor:pointer;border:none;background:${active?'var(--bg-dark)':'transparent'};color:${active?'#fff':'var(--text-secondary)'};font-weight:${active?'600':'400'};font-family:'Inter',sans-serif;transition:all 0.15s">${label}</button>`;
  }

  let content = "";

  if (activeTab === "overview") {
    // Key metrics row
    const metrics = [
      { label: "ROI (UW)", val: roi.toFixed(1)+"%", color: roiColor, sub: equityIn > 0 ? `on ${fmt$(equityIn)} equity` : "" },
      { label: "IRR", val: irr !== null ? irr.toFixed(1)+"%" : "—", color: irr >= 20 ? "#34C759" : irr >= 12 ? "#FF9F0A" : "#FF3B30", sub: "4yr hold" },
      { label: "Profit", val: fmt$(profit), color: profit > 0 ? "#34C759" : "#FF3B30", sub: "total return" },
      { label: "Exit Value", val: fmt$(exitValue), color: "var(--text)", sub: `@ ${exitCap}% cap` },
    ];
    content += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">`;
    metrics.forEach(m => {
      content += `<div style="background:var(--bg);border-radius:var(--radius);padding:14px">
        <div style="font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:6px">${m.label}</div>
        <div style="font-size:22px;font-weight:700;color:${m.color};letter-spacing:-1px;line-height:1">${m.val}</div>
        ${m.sub ? `<div style="font-size:10px;color:var(--text-muted);margin-top:4px">${m.sub}</div>` : ""}
      </div>`;
    });
    content += `</div>`;

    // Counter price
    if (targetData) {
      const gap = askingPrice - targetData.price;
      const gapPct = askingPrice > 0 ? gap / askingPrice * 100 : 0;
      content += `<div style="background:var(--bg);border-radius:var(--radius);padding:16px;margin-bottom:12px">
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:12px">Counter Offer Analysis</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
          <div>
            <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">Target Price (100% ROI)</div>
            <div style="font-size:18px;font-weight:700;color:#34C759;letter-spacing:-0.5px">${fmt$(targetData.price)}</div>
            ${sqft ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">$${Math.round(targetData.price/sqft)}/SF</div>` : ""}
          </div>
          <div>
            <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">ROI @ Asking</div>
            <div style="font-size:18px;font-weight:700;color:${askRoiColor};letter-spacing:-0.5px">${askingMetrics ? askingMetrics.roi.toFixed(1)+"%" : "—"}</div>
          </div>
          <div>
            <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">Gap to Target</div>
            <div style="font-size:18px;font-weight:700;color:${gap>0?"#FF3B30":"#34C759"};letter-spacing:-0.5px">${gap>0?"-":"+"}${fmt$(Math.abs(gap))}</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${Math.abs(gapPct).toFixed(1)}% ${gap>0?"above":"below"} target</div>
          </div>
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-light);font-size:11px;color:var(--text-muted)">
          ${rate}% rate · ${amortYears}yr amort · ${downPct}% down · ${exitCap}% exit cap · 4yr hold · Closing costs: 1% of loan + $25K
        </div>
      </div>`;
    }

    // Return breakdown
    if (askingMetrics) {
      content += `<div style="background:var(--bg);border-radius:var(--radius);padding:16px">
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px">Return Breakdown @ Asking</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px">
          <span style="color:var(--text-muted)">Down Payment</span><span style="font-weight:500;text-align:right">${fmt$(askingMetrics.down)}</span>
          <span style="color:var(--text-muted)">Closing Costs</span><span style="font-weight:500;text-align:right">${fmt$(askingMetrics.closingCosts)}</span>
          <span style="color:var(--text-muted)">Total Equity In</span><span style="font-weight:600;text-align:right">${fmt$(askingMetrics.totalEquity)}</span>
          <span style="color:var(--text-muted);padding-top:8px;border-top:1px solid var(--border-light)">4yr Operating CF</span><span style="font-weight:500;text-align:right;padding-top:8px;border-top:1px solid var(--border-light)">${fmt$(askingMetrics.annualCF.reduce((a,b)=>a+b,0))}</span>
          <span style="color:var(--text-muted)">Net Exit Proceeds</span><span style="font-weight:500;text-align:right">${fmt$(askingMetrics.netExit)}</span>
          <span style="color:var(--text-muted)">Loan Payoff</span><span style="font-weight:500;text-align:right;color:#FF3B30">-${fmt$(askingMetrics.loanPayoff)}</span>
          <span style="color:var(--text);font-weight:600;padding-top:8px;border-top:1px solid var(--border-light)">Total Profit</span><span style="font-weight:700;text-align:right;color:${askingMetrics.profit>0?"#34C759":"#FF3B30"};padding-top:8px;border-top:1px solid var(--border-light)">${fmt$(askingMetrics.profit)}</span>
        </div>
      </div>`;
    }
  }

  else if (activeTab === "cashflow") {
    const years = acqDate ? [acqDate.getFullYear(), acqDate.getFullYear()+1, acqDate.getFullYear()+2, acqDate.getFullYear()+3] : ["Yr 1","Yr 2","Yr 3","Yr 4"];
    const annualDS = askingMetrics ? askingMetrics.annualDS : 0;
    const a = tilcModel.annual;

    function row(label, vals, opts={}) {
      const { bold, color, negative, subtotal, indent } = opts;
      const tdStyle = `text-align:right;padding:7px 12px;font-weight:${bold?'600':'400'};${color?'color:'+color:''}`;
      const labelStyle = `padding:7px 12px;${indent?'padding-left:24px;':''}color:${bold?'var(--text)':'var(--text-secondary)'};font-weight:${bold?'600':'400'}`;
      const rowStyle = subtotal ? 'border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(0,0,0,0.02)' : 'border-bottom:1px solid var(--border-light)';
      return `<tr style="${rowStyle}"><td style="${labelStyle}">${label}</td>${vals.map(v=>{
        const isNeg = negative || v < 0;
        const c = color || (isNeg ? '#FF3B30' : 'var(--text)');
        return `<td style="text-align:right;padding:7px 12px;font-weight:${bold?'600':'400'};color:${c}">${v===0?'—':isNeg&&v>0?'-'+fmt$(v):fmt$(v)}</td>`;
      }).join('')}</tr>`;
    }

    content += `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:2px solid var(--border)">
        <th style="text-align:left;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted);width:200px">Line Item</th>
        ${years.map(y=>`<th style="text-align:right;padding:8px 12px;font-size:11px;font-weight:600;color:var(--text)">${y}</th>`).join("")}
      </tr></thead><tbody>`;

    // Income section
    content += `<tr><td colspan="5" style="padding:8px 12px 4px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Income</td></tr>`;
    content += row("Base Rent", a.map(yr=>yr.baseRent));
    content += row("Recovery Income", a.map(yr=>yr.recoveryRent));
    content += row("Free Rent Concessions", a.map(yr=>yr.freeRentLoss), {negative:true, color:'#FF9F0A', indent:true});
    content += row("Vacancy Loss", a.map(yr=>yr.vacancyLoss), {negative:true, color:'#FF3B30', indent:true});
    content += row("Gross Operating Income", a.map(yr=>yr.grossIncome), {bold:true, subtotal:true});

    // TILC section
    content += `<tr><td colspan="5" style="padding:8px 12px 4px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">TILC</td></tr>`;
    content += row("Tenant Improvements", a.map(yr=>yr.tiCosts), {negative:true, color:'#FF3B30', indent:true});
    content += row("Leasing Commissions", a.map(yr=>yr.lcCosts), {negative:true, color:'#FF3B30', indent:true});
    content += row("Net Operating CF", a.map(yr=>yr.netOperatingCF), {bold:true, subtotal:true});

    // Expenses section
    if (proFormaExpenses > 0) {
      content += `<tr><td colspan="5" style="padding:8px 12px 4px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Expenses</td></tr>`;
      content += row("Operating Expenses", [proFormaExpenses,proFormaExpenses,proFormaExpenses,proFormaExpenses], {negative:true, color:'#FF3B30', indent:true});
      content += row("Net Operating Income", a.map(yr=>yr.grossIncome - proFormaExpenses), {bold:true, subtotal:true});
    }

    // Debt service
    if (annualDS > 0) {
      content += `<tr><td colspan="5" style="padding:8px 12px 4px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Financing</td></tr>`;
      content += row("Debt Service", [annualDS,annualDS,annualDS,annualDS], {negative:true, indent:true});
      if (askingMetrics) {
        content += row("Cash Flow After DS", askingMetrics.annualCF, {bold:true, subtotal:true});
      }
    }

    // Exit (Year 4 only)
    if (exitValue && askingMetrics) {
      content += `<tr><td colspan="5" style="padding:8px 12px 4px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px">Exit (Year 4)</td></tr>`;
      content += `<tr style="border-bottom:1px solid var(--border-light)"><td style="padding:7px 12px;padding-left:24px;color:var(--text-secondary)">Exit Value @ ${exitCap}% Cap</td><td>—</td><td>—</td><td>—</td><td style="text-align:right;padding:7px 12px;color:#34C759;font-weight:500">${fmt$(exitValue)}</td></tr>`;
      content += `<tr style="border-bottom:1px solid var(--border-light)"><td style="padding:7px 12px;padding-left:24px;color:var(--text-secondary)">Loan Payoff</td><td>—</td><td>—</td><td>—</td><td style="text-align:right;padding:7px 12px;color:#FF3B30;font-weight:500">-${fmt$(askingMetrics.loanPayoff)}</td></tr>`;
      const netExit = exitValue - askingMetrics.loanPayoff;
      content += `<tr style="border-bottom:1px solid var(--border-light)"><td style="padding:7px 12px;padding-left:24px;color:var(--text-secondary)">Net Exit Proceeds</td><td>—</td><td>—</td><td>—</td><td style="text-align:right;padding:7px 12px;font-weight:600;color:${netExit>=0?'#34C759':'#FF3B30'}">${fmt$(netExit)}</td></tr>`;
    }

    content += `</tbody></table></div>`;
  }

  else if (activeTab === "proforma") {
    // 4-year pro forma rent roll — shows status per year per tenant
    const years = acqDate ? [acqDate.getFullYear(), acqDate.getFullYear()+1, acqDate.getFullYear()+2, acqDate.getFullYear()+3] : ["Yr 1","Yr 2","Yr 3","Yr 4"];
    const statusColors = { "Active":"#34C759", "Free Rent":"#FF9F0A", "Vacant":"#FF3B30", "New Tenant (NNN)":"#0071E3", "New Tenant":"#0071E3" };

    content += `<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:1px solid var(--border)">
        <th style="text-align:left;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted)">Tenant</th>
        <th style="text-align:left;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted)">Suite</th>
        <th style="text-align:right;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted)">SF</th>
        ${years.map(y=>`<th style="text-align:center;padding:8px 12px;font-size:11px;font-weight:600;color:var(--text)">${y}</th>`).join("")}
      </tr></thead><tbody>`;

    tilcModel.tenantProforma.forEach(t => {
      content += `<tr style="border-bottom:1px solid var(--border-light)">
        <td style="padding:8px 12px;font-weight:500;color:${t.isVacant?'var(--text-muted)':'var(--text)'}">${esc(t.name)}</td>
        <td style="padding:8px 12px;color:var(--text-muted)">${esc(t.suite||"—")}</td>
        <td style="text-align:right;padding:8px 12px">${fmtNum(t.sqft)}</td>
        ${t.yearStatus.map(ys => {
          const color = statusColors[ys.status] || 'var(--text-muted)';
          const isNNN = ys.status.includes("NNN") || ys.status.includes("New Tenant");
          const rentStr = ys.rentPsf > 0 ? `$${ys.rentPsf.toFixed(2)}/SF` : "—";
          const recStr = isNNN && ys.recPsf > 0 ? `+$${ys.recPsf.toFixed(2)} rec` : "";
          return `<td style="text-align:center;padding:6px 12px">
            <div style="font-size:9px;font-weight:600;color:${color};background:${color}15;border-radius:10px;padding:2px 7px;display:inline-block;margin-bottom:2px">${ys.status}</div>
            <div style="font-size:10px;color:var(--text-muted)">${rentStr}</div>
            ${recStr ? `<div style="font-size:9px;color:#0071E3">${recStr}</div>` : ""}
          </td>`;
        }).join("")}
      </tr>`;
    });

    // Total rows
    content += `<tr style="border-top:2px solid var(--border);background:rgba(0,0,0,0.02)">
      <td colspan="3" style="padding:8px 12px;font-weight:600;color:var(--text)">Total Base Rent</td>
      ${tilcModel.annual.map(yr=>`<td style="text-align:center;padding:8px 12px;font-weight:700;color:var(--text)">${fmt$(yr.baseRent)}</td>`).join("")}
    </tr>`;
    content += `<tr style="background:rgba(0,0,0,0.02)">
      <td colspan="3" style="padding:6px 12px;font-weight:500;color:var(--text-secondary)">Total Recovery</td>
      ${tilcModel.annual.map(yr=>`<td style="text-align:center;padding:6px 12px;font-weight:500;color:var(--text-secondary)">${fmt$(yr.recoveryRent)}</td>`).join("")}
    </tr>`;

    content += `</tbody></table></div>`;
  }

  else if (activeTab === "expirations") {
    const currentYear = acqDate ? acqDate.getFullYear() : new Date().getFullYear();
    const expByYear = {};

    tenants.forEach(t => {
      if (t.isVacant) return;
      const leaseEndStr = (t.leaseEnd || "").toString().trim();
      let yr;
      if (t.isMTM || leaseEndStr.toUpperCase() === "MTM") {
        yr = currentYear; // MTM counts as current year
      } else {
        const parsed = parseLeaseDate(leaseEndStr);
        if (!parsed) return;
        yr = parsed.year;
      }
      if (!expByYear[yr]) expByYear[yr] = [];
      expByYear[yr].push(t);
    });

    const totalGLA = tenants.reduce((s,t) => s+(t.sqft||0), 0);
    // All years from current to max expiry, fill gaps with 0
    const allYrs = Object.keys(expByYear).map(Number).sort((a,b)=>a-b);
    if (!allYrs.length) { content += `<div style="color:var(--text-muted);font-size:13px">No expiration data</div>`; }
    else {
      const minYr = allYrs[0], maxYr = allYrs[allYrs.length-1];
      const chartYears = [];
      for (let y = minYr; y <= maxYr; y++) chartYears.push(y);
      const maxSF = Math.max(...chartYears.map(y => (expByYear[y]||[]).reduce((s,t)=>s+(t.sqft||0),0)), 1);
      const BAR_H = 120;

      // Bar chart
      content += `<div style="margin-bottom:24px">`;
      content += `<div style="display:flex;align-items:flex-end;gap:6px;height:${BAR_H+40}px;padding:0 4px;border-bottom:2px solid var(--border)">`;
      chartYears.forEach(y => {
        const yrTenants = expByYear[y] || [];
        const sf = yrTenants.reduce((s,t)=>s+(t.sqft||0),0);
        const pct = totalGLA > 0 ? sf/totalGLA*100 : 0;
        const h = sf > 0 ? Math.max(4, Math.round(sf/maxSF*BAR_H)) : 0;
        const isCurrent = y === currentYear;
        const color = pct > 30 ? "#FF3B30" : pct > 15 ? "#FF9F0A" : "#0071E3";
        content += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
          ${sf > 0 ? `<div style="font-size:10px;font-weight:600;color:${color};margin-bottom:3px">${pct.toFixed(1)}%</div>` : `<div style="font-size:10px;color:var(--text-muted);margin-bottom:3px">—</div>`}
          <div style="width:100%;height:${h}px;background:${sf>0?color:'transparent'};border-radius:3px 3px 0 0"></div>
        </div>`;
      });
      content += `</div>`;
      // X axis labels
      content += `<div style="display:flex;gap:6px;padding:0 4px;margin-top:6px">`;
      chartYears.forEach(y => {
        const isCurrent = y === currentYear;
        content += `<div style="flex:1;text-align:center;font-size:10px;font-weight:${isCurrent?'700':'500'};color:${isCurrent?'var(--text)':'var(--text-muted)'}">${y}${isCurrent?' *':''}</div>`;
      });
      content += `</div>`;
      if (expByYear[currentYear]) {
        content += `<div style="font-size:10px;color:var(--text-muted);margin-top:4px;padding:0 4px">* includes month-to-month tenants</div>`;
      }
      content += `</div>`;

      // Table — grouped by year, year header row then tenants
      content += `<table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="border-bottom:1px solid var(--border)">
          <th style="text-align:left;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted)">Tenant</th>
          <th style="text-align:right;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted)">SF</th>
          <th style="text-align:right;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted)">% Bldg</th>
          <th style="text-align:right;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted)">Expiry</th>
          <th style="text-align:right;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted)">Contract $/SF</th>
          <th style="text-align:right;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted)">Market $/SF</th>
          <th style="text-align:right;padding:8px 12px;font-size:11px;font-weight:500;color:var(--text-muted)">▲▼</th>
        </tr></thead><tbody>`;

      chartYears.forEach(y => {
        const yrTenants = expByYear[y];
        if (!yrTenants || !yrTenants.length) return;
        const yrSF = yrTenants.reduce((s,t)=>s+(t.sqft||0),0);
        const yrPct = totalGLA > 0 ? yrSF/totalGLA*100 : 0;
        const color = yrPct>30?"#FF3B30":yrPct>15?"#FF9F0A":"#0071E3";

        // Year header row
        content += `<tr style="background:rgba(0,0,0,0.03);border-top:2px solid var(--border)">
          <td style="padding:8px 12px;font-weight:700;color:${color}">${y}${y===currentYear?" (incl. MTM)":""}</td>
          <td style="text-align:right;padding:8px 12px;font-weight:700;color:${color}">${fmtNum(yrSF)}</td>
          <td style="text-align:right;padding:8px 12px;font-weight:700;color:${color}">${yrPct.toFixed(1)}%</td>
          <td colspan="4"></td>
        </tr>`;

        // Tenant rows
        yrTenants.forEach(t => {
          const adjMR = adjMarketRent(marketRent, t.sqft);
          const variance = adjMR > 0 && t.rentPerSf ? t.rentPerSf - adjMR : null;
          const varPct = adjMR > 0 && t.rentPerSf ? (t.rentPerSf/adjMR-1)*100 : null;
          const glaPct = totalGLA > 0 ? (t.sqft||0)/totalGLA*100 : 0;
          const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
          const parsed = parseLeaseDate(t.leaseEnd);
          const expStr = t.isMTM ? "MTM" : parsed ? `${monthNames[parsed.month]} ${parsed.year}` : "—";
          content += `<tr style="border-bottom:1px solid var(--border-light)">
            <td style="padding:7px 12px 7px 24px;color:var(--text)">${esc(t.name)}${t.suite?` <span style="color:var(--text-muted);font-size:10px">Suite ${esc(t.suite)}</span>`:""}</td>
            <td style="text-align:right;padding:7px 12px">${fmtNum(t.sqft)}</td>
            <td style="text-align:right;padding:7px 12px;color:var(--text-muted)">${glaPct.toFixed(1)}%</td>
            <td style="text-align:right;padding:7px 12px;color:${t.isMTM?'#FF9F0A':'var(--text-secondary)'}">${expStr}</td>
            <td style="text-align:right;padding:7px 12px">${t.rentPerSf?"$"+t.rentPerSf.toFixed(2):"—"}</td>
            <td style="text-align:right;padding:7px 12px;color:var(--text-muted)">${adjMR?"$"+adjMR.toFixed(2):"—"}</td>
            <td style="text-align:right;padding:7px 12px;font-weight:500;color:${variance===null?'var(--text-muted)':variance>=0?'#34C759':'#FF3B30'}">${variance!==null?(variance>=0?"▲ +":"▼ ")+Math.abs(variance).toFixed(2)+" ("+Math.abs(varPct).toFixed(0)+"%)":"—"}</td>
          </tr>`;
        });
      });
      content += `</tbody></table>`;
    }
  }

  return `<div style="background:var(--bg-card);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;box-shadow:var(--shadow-sm)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <div style="font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px">Financial Analysis</div>
      <div style="display:flex;background:rgba(0,0,0,0.04);border-radius:20px;padding:3px;gap:2px;flex-wrap:wrap">
        ${tabBtn("overview","Overview")}
        ${tabBtn("cashflow","Cash Flow")}
        ${tabBtn("proforma","Pro Forma")}
        ${tabBtn("expirations","Expirations")}
      </div>
    </div>
    ${content}
  </div>`;
}

function renderDealDetail(d) {
  const s = stg(d.stage);
  const p = pri(d.priority);
  const sc = parseFloat(d.score);
  const priceSf = d.sqft > 0 ? "$" + Math.round(d.askingPrice / d.sqft) : "—";
  const ptMap = { stnnn:"Single Tenant NNN", multi:"Multi-Tenant Retail", industrial:"Industrial", outparcel:"Outparcel", other:"Other" };
  const condOpts = ["","Excellent","Good","Fair","Poor"];
  const tenants = state.dealDetailTenants;

  let h = `<div style="max-width:1100px;margin:0 auto;padding-bottom:40px">`;

  // Header bar
  h += `<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
    <button data-action="deal-back" style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text);font-family:'Inter',sans-serif">← Back</button>
    <div style="flex:1">
      <div style="font-family:'Inter',sans-serif;font-size:22px;font-weight:800;color:var(--text)">${esc(d.name)}</div>
      <div style="font-size:12px;color:var(--text-muted)">${esc(d.address)}</div>
    </div>
    <span class="stage-badge" style="color:${s.color};background:${s.color}15;font-size:11px;padding:4px 12px">${s.label}</span>
    <span class="pri-badge" style="color:${p.color};background:${p.bg}">${p.label}</span>
    ${sc ? `<span class="td-score" style="color:${scoreColor(sc)};background:${scoreBg(sc)}">${sc}/10</span>` : ""}
  </div>`;

  // Info grid
  const dom = d.listingDate ? Math.floor((Date.now() - new Date(d.listingDate+"T00:00:00").getTime()) / 864e5) : null;
  h += `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px">`;
  [["Asking Price",fmt$(d.askingPrice)],["NOI",fmt$(d.noi)],["Cap Rate",d.capRate?d.capRate+"%":"—"],
   ["Sq Ft",d.sqft?fmtNum(d.sqft):"—"],["Price/SF",priceSf],["Acreage",d.acreage||"—"],
   ["# Tenants",d.numTenants||"—"],["WALT",d.walt||"—"],["Type",ptMap[d.propertyType]||"—"],
   ["VPD",d.vehiclesPerDay?fmtNum(d.vehiclesPerDay):"—"],["3mi Pop",d.pop3mi?fmtNum(d.pop3mi):"—"],["3mi AHI",d.ahi3mi?fmt$(d.ahi3mi):"—"],
   ["Listing Date",d.listingDate||"—"],["Listing Status",d.listingStatus||"—"],["Days on Market",dom!==null?dom+"d":"—"]
  ].forEach(([l,v])=>{h+=`<div><div style="font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:3px">${l}</div><div style="font-size:14px;font-weight:700;color:var(--text)">${v}</div></div>`;});
  h += `</div></div>`;

  // Links row
  const links=[];
  if(d.listingLink){const src=d.listingLink.includes("crexi")?"Crexi":d.listingLink.includes("costar")?"CoStar":"Listing";links.push({label:src,url:d.listingLink,color:"#3B82F6",bg:"#EFF6FF",border:"#BFDBFE"});}
  if(d.uwLink)links.push({label:"UW",url:d.uwLink,color:"#8B5CF6",bg:"#F5F3FF",border:"#DDD6FE"});
  if(d.costarLink)links.push({label:"CoStar",url:d.costarLink,color:"#0EA5E9",bg:"#F0F9FF",border:"#BAE6FD"});
  if(d.loiLink)links.push({label:"LOI",url:d.loiLink,color:"#16A34A",bg:"#F0FDF4",border:"#BBF7D0"});
  if(d.sfLoiLink)links.push({label:"SF LOI",url:d.sfLoiLink,color:"#10B981",bg:"#ECFDF5",border:"#A7F3D0"});
  if(d.omLink)links.push({label:"OM",url:d.omLink,color:"#F59E0B",bg:"#FFFBEB",border:"#FDE68A"});
  if(links.length){h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">`;links.forEach(l=>{h+=`<a href="${esc(l.url)}" target="_blank" style="padding:6px 14px;background:${l.bg};border:1px solid ${l.border};border-radius:8px;font-size:12px;color:${l.color};text-decoration:none;font-weight:600">🔗 ${l.label}</a>`;});h+=`</div>`;}

  // Call Log

  if(d.callLog&&d.callLog.length){
    h+=`<div style="max-height:240px;overflow-y:auto">`;
    [...d.callLog].reverse().forEach(c=>{
      const date=c.time?new Date(c.time).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):"";
      const statusColor=c.status==="Broker Sending Info"?"#10B981":c.status==="Deal Sold"||c.status==="Wrong Number"?"#EF4444":"#64748B";
      h+=`<div style="padding:8px 0;border-bottom:1px solid var(--border-light);font-size:12px">

          <span style="color:var(--text-muted);min-width:80px">${date}</span>

  // Property Condition

    <div style="font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:12px">Property Condition</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">`;
  [["propertyCondition","Overall","select"],["roofCondition","Roof","select"],["parkingCondition","Parking","select"],["hvacCondition","HVAC","select"],
   ["deferredMaint","Deferred Maint ($)","number"],["envConcerns","Environmental Concerns","text"]
  ].forEach(([field,label,type])=>{

    if(type==="select"){

      condOpts.forEach(o=>{h+=`<option value="${o}" ${(d[field]||"").toLowerCase()===o.toLowerCase()?"selected":""}>${o||"— Select —"}</option>`;});
      h+=`</select>`;
    } else {

  // Age fields
  h+=`</div><div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border-light)">

  [["roofAge","Roof"],["hvacAge","HVAC"],["parkingAge","Parking"]].forEach(([field,label])=>{

  });
  h+=`</div></div>
    <button data-action="deal-save-condition" style="margin-top:14px;padding:7px 18px;background:var(--bg-dark);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Save Condition</button>

  h+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--text)">Tenants${tenants.length?" ("+tenants.length+")":""}</div>
      ${d.uwLink?`<button data-action="deal-sync-tenants" data-uw="${esc(d.uwLink)}" style="padding:5px 12px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;color:#D97706;font-size:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">${tenants.length?"Re-sync from UW":"View Tenants"}</button>`:""}
    </div>
    <div id="deal-tenants-container">${tenants.length?renderTenantTimeline(tenants):"<div style='color:var(--text-muted);font-size:12px'>Click View Tenants to sync from UW.</div>"}</div>
  </div>`;

  // Notes
  if(d.notes){h+=`<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px"><div style="font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px">Notes</div><div style="font-size:13px;color:var(--text-secondary);line-height:1.6">${esc(d.notes)}</div></div>`;}

  // Action buttons
  h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:8px">`;
  STAGES.forEach(stg=>{h+=`<button data-action="deal-set-stage" data-value="${stg.id}" style="padding:6px 12px;border:1px solid ${d.stage===stg.id?stg.color:"var(--border)"};border-radius:8px;font-size:11px;cursor:pointer;background:${d.stage===stg.id?stg.color+"15":"var(--bg-card)"};color:${d.stage===stg.id?stg.color:"var(--text-muted)"};font-weight:600;font-family:'Inter',sans-serif">${stg.label}</button>`;});
  h+=`<button data-action="deal-remove" style="margin-left:auto;padding:6px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;font-size:11px;cursor:pointer;color:#EF4444;font-weight:600;font-family:'Inter',sans-serif">✕ Remove Deal</button>`;
  h+=`</div>`;

  // Call log overlay (hidden by default)
  h+=`<div id="call-log-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;align-items:center;justify-content:center">
    <div style="background:var(--bg-card);border-radius:14px;padding:28px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.2)">
      <div style="font-family:'Inter',sans-serif;font-size:17px;font-weight:800;margin-bottom:18px">Log a Call</div>
      <div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px">STATUS</div>
        <select id="call-status-input" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif">
          <option>Called — No Answer</option>
          <option>Left Voicemail</option>
          <option>Broker Sending Info</option>
          <option>Not Interested</option>
          <option>Deal Sold</option>
          <option>Wrong Number</option>
          <option>Other</option>
        </select>
      </div>
      <div style="margin-bottom:18px">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px">NOTE (optional)</div>
        <textarea id="call-note-input" rows="3" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;resize:none" placeholder="Add a note..."></textarea>
      </div>
      <div style="display:flex;gap:8px">
        <button id="call-log-save" style="flex:1;padding:10px;background:var(--bg-dark);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">Save</button>
        <button id="call-log-cancel" style="padding:10px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif">Cancel</button>
      </div>
    </div>
  </div>`;

  h+=`</div>`;
  return h;
}

function wireDealDetailEvents() {
  const d = state.deals.find(dl => dl.id === state.selectedDealDetail);
  if (!d) return;

  // Snapshot condition fields into d before any render() so unsaved edits survive re-renders
  function snapshotCondition() {
    document.querySelectorAll("[data-cond-field]").forEach(el => {
      const field = el.dataset.condField;
      const numFields = ["deferredMaint","roofAge","hvacAge","parkingAge"];
      d[field] = numFields.includes(field) ? parseFloat(el.value) || 0 : el.value;
    });
  }

  // Back
  const back = document.querySelector("[data-action='deal-back']");
  if (back) back.addEventListener("click", () => { state.selectedDealDetail = null; state.dealDetailTenants = []; state.dealDetailComps = []; state.dealDetailSynced = false; state.dealDetailProFormaNoi = 0; state.dealDetailProFormaExpenses = 0; state.dealDetailLoanData = { rate:0, amortYears:0, downPct:0, exitCap:0 }; state.dealDetailIRRCashflows = []; state.dealDetailEquityIn = 0; state.dealDetailAcqDate = null; state.dealDetailFinTab = "overview"; render(); });

  // Stage selector
  document.querySelectorAll("[data-action='deal-set-stage']").forEach(btn => {
    btn.addEventListener("click", async () => { snapshotCondition(); d.stage = btn.dataset.value; await saveDealsToSheet(); render(); });
  });

  // Remove deal
  const removeBtn = document.querySelector("[data-action='deal-remove']");
  if (removeBtn) removeBtn.addEventListener("click", async () => {
    if (!confirm("Remove this deal? This cannot be undone.")) return;
    state.deals = state.deals.filter(dl => dl.id !== d.id);
    state.selectedDealDetail = null; state.dealDetailTenants = []; state.dealDetailComps = []; state.dealDetailSynced = false; state.dealDetailProFormaNoi = 0; state.dealDetailProFormaExpenses = 0; state.dealDetailLoanData = { rate:0, amortYears:0, downPct:0, exitCap:0 }; state.dealDetailIRRCashflows = []; state.dealDetailEquityIn = 0; state.dealDetailAcqDate = null; state.dealDetailFinTab = "overview";
    await saveDealsToSheet(); render();
  });

  // Save condition
  const saveCondBtn = document.querySelector("[data-action='deal-save-condition']");
  if (saveCondBtn) saveCondBtn.addEventListener("click", async () => {
    snapshotCondition();
    await saveDealsToSheet(); saveCondBtn.textContent = "Saved ✓"; setTimeout(() => { saveCondBtn.textContent = "Save Condition"; }, 1500);
  });

  // Log call overlay
  const logCallBtn = document.querySelector("[data-action='deal-log-call']");
  const overlay = document.getElementById("call-log-overlay");
  const saveCallBtn = document.getElementById("call-log-save");
  const cancelCallBtn = document.getElementById("call-log-cancel");
  if (logCallBtn && overlay) {
    logCallBtn.addEventListener("click", () => { overlay.style.display = "flex"; });
    cancelCallBtn.addEventListener("click", () => { overlay.style.display = "none"; });
    overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.style.display = "none"; });
    saveCallBtn.addEventListener("click", async () => {
      const status = document.getElementById("call-status-input").value;
      const note = document.getElementById("call-note-input").value.trim();
      if (!d.callLog) d.callLog = [];
      d.callLog.push({ time: Date.now(), status, note });
      d.lastActivity = Date.now();
      if (status === "Broker Sending Info" || status === "Called — No Answer" || status === "Left Voicemail") { d.brokerReached = status === "Broker Sending Info"; }
      overlay.style.display = "none";
      snapshotCondition();
      await saveDealsToSheet(); render();
    });
  }

  // View Tenants (sync from UW)
  const syncBtn = document.querySelector("[data-action='deal-sync-tenants']");
  if (syncBtn) syncBtn.addEventListener("click", async () => {
    const uwLink = syncBtn.dataset.uw;
    const container = document.getElementById("deal-tenants-container");
    if (!uwLink) return;
    syncBtn.textContent = "Loading..."; syncBtn.style.pointerEvents = "none";
    try {
      const uwMatch = uwLink.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (!uwMatch) { container.innerHTML = '<div style="color:#EF4444;font-size:11px">Invalid UW link</div>'; return; }
      const uwSheetId = uwMatch[1];
      const strip$ = v => parseFloat((v||"").toString().replace(/[$,%]/g,"")) || 0;
      const mtmEnd = () => { const dt = new Date(); return new Date(dt.getFullYear(), dt.getMonth()+1, 0).toISOString().split("T")[0]; };
      const rrResp = await fetch(SHEETS_BASE+"/"+uwSheetId+"/values/'Rent Roll'!A13:P50", {headers:{"Authorization":"Bearer "+state.accessToken}});
      const rrData = await rrResp.json();
      let leaseEvents = [];
      try {
        const lsResp = await fetch(SHEETS_BASE+"/"+uwSheetId+"/values/'Lease Schedule'!A2:J200", {headers:{"Authorization":"Bearer "+state.accessToken}});
        const lsData = await lsResp.json();
        if (lsData.values) leaseEvents = lsData.values.map(row => { const s$=v=>parseFloat((v||"").toString().replace(/[$,%]/g,""))||0; return {tenantName:(row[0]||"").trim(),suite:(row[1]||"").trim(),eventType:(row[2]||"").trim(),startDate:(row[3]||"").toString().split("T")[0].split(" ")[0],endDate:(row[4]||"").toString().split("T")[0].split(" ")[0],monthlyRentSf:s$(row[5]),annualRentSf:s$(row[6]),bumpPct:s$(row[7]),leaseType:(row[8]||"").trim().toLowerCase(),notes:(row[9]||"").trim()}; });
      } catch(e) {}
      if (!rrData.values || rrData.values.length < 2) { container.innerHTML = '<div style="color:#EF4444;font-size:11px">No rent roll data found</div>'; return; }
      const rows = rrData.values; const tenants = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i]; const tenantName = (row[1]||"").trim();
        // Stop only on truly empty rows or summary rows, not on "Vacant" tenants
        if (!tenantName) break;
        if (tenantName === "Total" || tenantName === "Occupied") break;
        const suite = (row[2]||"").trim(); const gla = parseFloat(row[3])||0;
        const ls = (row[5]||"").toString().split("T")[0].split(" ")[0];
        const rawEnd = (row[6]||"").toString().trim(); const isMTM = rawEnd.toUpperCase() === "MTM";
        const le = isMTM ? mtmEnd() : rawEnd.split("T")[0].split(" ")[0];
        const isVacant = tenantName.toLowerCase() === "vacant";
        const annualRecovery = strip$(row[10]);
        const tenantEvts = leaseEvents.filter(e => e.tenantName === tenantName && e.suite === suite);
        const lsType = tenantEvts.length && tenantEvts[tenantEvts.length-1].leaseType ? tenantEvts[tenantEvts.length-1].leaseType : "";
        const detectedLeaseType = isVacant ? "vacant" : annualRecovery > 0 ? "nnn" : "gross";
        tenants.push({name:tenantName,suite,sqft:gla,leaseType:lsType||detectedLeaseType,leaseStart:ls,leaseEnd:le,isMTM,rentPerSf:strip$(row[9]),annualRent:strip$(row[7]),annualRecovery,recoveryPerSf:strip$(row[12]),totalRevenue:strip$(row[13]),isVacant,creditType:"",leaseSchedule:tenantEvts});
      }
      state.dealDetailTenants = tenants;
      state.dealDetailSynced = true;
      // Fetch pro forma NOI (E30) and pro forma expenses (E28)
      try {
        const pfResp = await fetch(SHEETS_BASE+"/"+uwSheetId+"/values/'Expenses'!E28:E30", {headers:{"Authorization":"Bearer "+state.accessToken}});
        const pfData = await pfResp.json();
        const rows = pfData.values || [];
        state.dealDetailProFormaExpenses = parseFloat((rows[0]?.[0]||"").toString().replace(/[$,]/g,"")) || 0;
        state.dealDetailProFormaNoi = parseFloat((rows[2]?.[0]||"").toString().replace(/[$,]/g,"")) || 0;
      } catch(e) { state.dealDetailProFormaNoi = 0; state.dealDetailProFormaExpenses = 0; }
      // Fetch loan data from Analysis sheet (rate J19, amort J20, down% E23)
      try {
        const loanResp = await fetch(SHEETS_BASE+"/"+uwSheetId+"/values/'Analysis'!J19:J20", {headers:{"Authorization":"Bearer "+state.accessToken}});
        const loanData = await loanResp.json();
        const downResp = await fetch(SHEETS_BASE+"/"+uwSheetId+"/values/'Analysis'!E23", {headers:{"Authorization":"Bearer "+state.accessToken}});
        const downData = await downResp.json();
        const strip = v => parseFloat((v||"").toString().replace(/[$,%]/g,"")) || 0;
        const lv = loanData.values || [];
        const rawRate = strip(lv[0]?.[0]);
        const rawDown = strip(downData.values?.[0]?.[0]);
        state.dealDetailLoanData = {
          rate: rawRate < 1 ? rawRate * 100 : rawRate,       // 0.06 → 6
          amortYears: strip(lv[1]?.[0]),
          downPct: rawDown < 1 ? rawDown * 100 : rawDown,    // 0.30 → 30
          exitCap: 0
        };
        // Fetch exit cap rate from Rent Roll!C10
        try {
          const exitCapResp = await fetch(SHEETS_BASE+"/"+uwSheetId+"/values/'Rent Roll'!C10", {headers:{"Authorization":"Bearer "+state.accessToken}});
          const exitCapData = await exitCapResp.json();
          const exitCapVal = exitCapData.values?.[0]?.[0];
          // C10 is stored as decimal (0.08) not percentage (8) — multiply by 100
          const rawExitCap = parseFloat((exitCapVal||"").toString().replace(/[%]/g,"")) || 0;
          state.dealDetailLoanData.exitCap = rawExitCap < 1 ? rawExitCap * 100 : rawExitCap;
        } catch(e) { state.dealDetailLoanData.exitCap = 0; }
      // Fetch IRR cashflows Rent Roll!N3:N6, equity in Analysis!B24, acq date Expenses!C6
      try {
        const [irrResp, equityResp, acqResp] = await Promise.all([
          fetch(SHEETS_BASE+"/"+uwSheetId+"/values/'Rent Roll'!N3:N6", {headers:{"Authorization":"Bearer "+state.accessToken}}),
          fetch(SHEETS_BASE+"/"+uwSheetId+"/values/'Analysis'!B24", {headers:{"Authorization":"Bearer "+state.accessToken}}),
          fetch(SHEETS_BASE+"/"+uwSheetId+"/values/'Expenses'!C6", {headers:{"Authorization":"Bearer "+state.accessToken}})
        ]);
        const irrData = await irrResp.json();
        const equityData = await equityResp.json();
        const acqData = await acqResp.json();
        const stripN = v => {
          const s = (v||"").toString().trim();
          // Handle parentheses negatives like (1,538,009.95)
          if (s.startsWith('(') && s.endsWith(')')) return -parseFloat(s.slice(1,-1).replace(/[$,]/g,"")) || 0;
          return parseFloat(s.replace(/[$,]/g,"")) || 0;
        };
        state.dealDetailIRRCashflows = (irrData.values || []).map(r => stripN(r[0]));
        state.dealDetailEquityIn = Math.abs(stripN(equityData.values?.[0]?.[0]));
        const acqRaw = (acqData.values?.[0]?.[0] || "").toString().trim();
        // Parse either "March 2026" text OR "2026-03-01T00:00:00" date serial string
        const months = {january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11};
        const mMatch = acqRaw.toLowerCase().match(/^([a-z]+)\s+(\d{4})$/);
        const dMatch = acqRaw.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (mMatch) {
          state.dealDetailAcqDate = new Date(parseInt(mMatch[2]), months[mMatch[1]] || 0, 1);
        } else if (dMatch) {
          state.dealDetailAcqDate = new Date(parseInt(dMatch[1]), parseInt(dMatch[2])-1, 1);
        } else {
          state.dealDetailAcqDate = new Date();
        }
      } catch(e) { state.dealDetailIRRCashflows = []; state.dealDetailEquityIn = 0; state.dealDetailAcqDate = new Date(); }
      } catch(e) { state.dealDetailLoanData = { rate:0, amortYears:0, downPct:0, exitCap:0 }; }
      // Also fetch Comps from Call to Broker tab (B16:J100 — skip col A which is empty)
      try {
        const compsResp = await fetch(SHEETS_BASE+"/"+uwSheetId+"/values/'Call to Broker'!B16:J100", {headers:{"Authorization":"Bearer "+state.accessToken}});
        const compsData = await compsResp.json();
        // Filter rows that have at least a type (col B, index 0) or address (col C, index 1)
        state.dealDetailComps = (compsData.values || []).filter(row => row && (row[0] || row[1]));

      const scorecardEl = document.getElementById("deal-scorecard");

      // Refresh summary
      const summaryEl = document.getElementById("deal-analysis-summary");

  });
}

// ---- QUICK UW CALCULATOR ----
function renderUWCalc() {
  const u = state.uwCalc || { price:"", sqft:"", rentPsf:"", vacancy:"8", expenseRatio:"35", targetCap:"7.5" };
  state.uwCalc = u;
  const price = parseFloat(u.price)||0;
  const sf = parseFloat(u.sqft)||0;
  const rent = parseFloat(u.rentPsf)||0;
  const vac = parseFloat(u.vacancy)||0;
  const exp = parseFloat(u.expenseRatio)||0;
  const cap = parseFloat(u.targetCap)||0;
  const canCalc = sf && rent && cap;
  const gpr = sf * rent;
  const egi = gpr * (1 - vac/100);
  const noi = egi * (1 - exp/100);
  const impliedValue = cap > 0 ? noi / (cap/100) : 0;
  const valuePsf = sf > 0 ? impliedValue / sf : 0;
  const spread = price > 0 ? impliedValue - price : 0;
  const spreadPct = price > 0 ? ((impliedValue/price)-1)*100 : 0;
  const impliedCap = price > 0 ? (noi/price)*100 : 0;

  let h = `<div style="max-width:680px;margin:32px auto;padding:0 24px">`;
  h += `<h2 style="font-family:'Inter',sans-serif;font-size:22px;font-weight:800;color:var(--text);margin-bottom:20px">Quick Underwriting Calculator</h2>`;
  h += `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px">`;
  
  // Input grid
  h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">`;
  [["Asking Price","uw-d-price",u.price,"4850000"],["Building SF","uw-d-sqft",u.sqft,"14820"],
   ["Rent / SF","uw-d-rent",u.rentPsf,"18.00"],["Vacancy %","uw-d-vac",u.vacancy,"8"],
   ["Expense Ratio %","uw-d-exp",u.expenseRatio,"35"],["Target Cap %","uw-d-cap",u.targetCap,"7.5"]
  ].forEach(([label,id,val,ph]) => {
    h += `<div><label style="display:block;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:4px">${label}</label><input type="number" id="${id}" value="${val}" placeholder="${ph}" style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;background:var(--bg);box-sizing:border-box"></div>`;
  });
  h += `</div>`;

  // Results
  if (canCalc) {
    const spreadColor = spread >= 0 ? "#10B981" : "#EF4444";
    const spreadSign = spread >= 0 ? "+" : "";
    h += `<div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">`;
    h += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;text-align:center">`;
    [["Gross Potential Revenue",fmt$(Math.round(gpr))],["Effective Gross Income",fmt$(Math.round(egi))],["Net Operating Income",fmt$(Math.round(noi))],
     ["Implied Value",fmt$(Math.round(impliedValue))],["Value / SF","$"+Math.round(valuePsf)],["Implied Cap Rate",impliedCap.toFixed(2)+"%"]
    ].forEach(([l,v]) => {
      h += `<div style="background:var(--bg);border-radius:8px;padding:12px"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600">${l}</div><div style="font-size:18px;font-weight:800;color:var(--text);margin-top:4px">${v}</div></div>`;
    });
    h += `</div>`;
    if (price > 0) {
      h += `<div style="margin-top:16px;text-align:center;background:${spread>=0?'#F0FDF4':'#FEF2F2'};border-radius:8px;padding:16px"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600">Spread vs Asking</div><div style="font-size:24px;font-weight:800;margin-top:4px;color:${spreadColor}">${spreadSign}${fmt$(Math.round(spread))}</div><div style="font-size:13px;color:${spreadColor};font-weight:600">${spreadSign}${spreadPct.toFixed(1)}%</div></div>`;
    }
    h += `</div>`;
  } else {
    h += `<div style="margin-top:24px;text-align:center;color:var(--text-muted);font-size:13px;padding:20px 0">Enter Rent/SF, Building SF, and Target Cap to see results</div>`;
  }

  h += `</div></div>`;
  return h;
}
