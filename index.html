<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CREFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg: #F5F5F7;
  --bg-card: #FFFFFF;
  --bg-dark: #1D1D1F;
  --bg-header: rgba(255,255,255,0.85);
  --text: #1D1D1F;
  --text-secondary: #6E6E73;
  --text-muted: #AEAEB2;
  --border: rgba(0,0,0,0.08);
  --border-light: rgba(0,0,0,0.04);
  --accent: #1D1D1F;
  --accent-blue: #0071E3;
  --radius: 12px;
  --radius-lg: 18px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);

  --prospecting: #5E5CE6;
  --underwriting: #FF9F0A;
  --loi: #0071E3;
  --loi-accepted: #32ADE6;
  --psa: #BF5AF2;
  --closed: #34C759;
  --dead: #AEAEB2;

  --pri-high: #FF3B30;
  --pri-med: #FF9F0A;
  --pri-low: #AEAEB2;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  letter-spacing: -0.01em;
}

/* ---- LOGIN ---- */
.login-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 20px;
  background: var(--bg);
}
.login-container h1 {
  font-size: 48px;
  font-weight: 700;
  color: var(--bg-dark);
  letter-spacing: -2px;
  line-height: 1;
}
.login-container p { color: var(--text-secondary); font-size: 17px; font-weight: 400; }
.login-btn {
  margin-top: 8px;
  padding: 14px 36px;
  background: var(--bg-dark);
  color: #fff;
  border: none;
  border-radius: 980px;
  font-size: 15px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: -0.01em;
}
.login-btn:hover { background: #2D2D2F; transform: scale(1.01); box-shadow: var(--shadow-md); }
.login-note { font-size: 12px; color: var(--text-muted); }

/* ---- HEADER ---- */
.header {
  background: var(--bg-header);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  max-width: 1440px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
}
.header-left { display: flex; align-items: center; gap: 28px; }
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--bg-dark);
  letter-spacing: -0.5px;
}
.header-right { display: flex; align-items: center; gap: 10px; }

/* ---- VIEW TOGGLE ---- */
.view-toggle {
  display: flex;
  background: rgba(0,0,0,0.05);
  border-radius: 8px;
  padding: 2px;
  gap: 1px;
}
.view-btn {
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  color: var(--text-secondary);
  background: transparent;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: -0.01em;
}
.view-btn.active {
  background: #fff;
  color: var(--text);
  box-shadow: var(--shadow-sm);
}
.view-btn:hover:not(.active) { color: var(--text); }

/* ---- SEARCH ---- */
.search-input {
  padding: 7px 14px 7px 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  width: 220px;
  outline: none;
  background: rgba(255,255,255,0.8);
  transition: all 0.15s;
  letter-spacing: -0.01em;
}
.search-input:focus { background: #fff; border-color: rgba(0,0,0,0.15); box-shadow: var(--shadow-sm); }
.search-input::placeholder { color: var(--text-muted); }

/* ---- STATS BAR ---- */
.stats-bar {
  max-width: 1440px;
  margin: 24px auto 0;
  padding: 0 40px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.stat-card {
  background: var(--bg-card);
  border: none;
  border-radius: var(--radius);
  padding: 16px 20px;
  flex: 1;
  min-width: 130px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.2s;
}
.stat-card:hover { box-shadow: var(--shadow-md); }
.stat-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0;
  margin-bottom: 6px;
}
.stat-value {
  font-size: 24px;
  font-weight: 700;
  color: var(--bg-dark);
  letter-spacing: -1px;
  line-height: 1;
}
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 400; }

/* ---- MAIN CONTENT ---- */
.main {
  max-width: 1440px;
  margin: 20px auto 60px;
  padding: 0 40px;
}

/* ---- KANBAN ---- */
.kanban {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 24px;
}
.kanban::-webkit-scrollbar { height: 4px; }
.kanban::-webkit-scrollbar-track { background: transparent; }
.kanban::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

.kanban-col {
  min-width: 256px;
  max-width: 290px;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.kanban-col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px;
  margin-bottom: 10px;
}
.kanban-col-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.kanban-col-count {
  font-size: 11px;
  font-weight: 500;
  padding: 1px 7px;
  border-radius: 20px;
  background: rgba(0,0,0,0.06);
  color: var(--text-secondary);
}
.kanban-cards { display: flex; flex-direction: column; gap: 8px; flex: 1; }

.k-card {
  background: var(--bg-card);
  border: none;
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}
.k-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
.k-card-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 2px;
  line-height: 1.35;
  letter-spacing: -0.2px;
}
.k-card-address {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 10px;
  font-weight: 400;
}
.k-card-metrics {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.k-metric {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}
.k-metric strong { color: var(--text); font-weight: 600; }
.k-card-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border-light);
}
.k-priority {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0;
}
.k-score {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
}
.k-links { display: flex; gap: 4px; margin-top: 8px; }
.k-link-pill {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 20px;
  text-decoration: none;
  transition: opacity 0.15s;
}
.k-link-pill:hover { opacity: 0.75; }

/* ---- TABLE ---- */
.table-container {
  background: var(--bg-card);
  border: none;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  position: sticky;
  top: 0;
  background: rgba(245,245,247,0.9);
  backdrop-filter: blur(8px);
  padding: 11px 16px;
  text-align: left;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  border-bottom: 1px solid var(--border);
}
thead th:hover { color: var(--text); }
thead th .sort-arrow { font-size: 9px; margin-left: 4px; }
tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(0,0,0,0.015); }
tbody td { padding: 11px 16px; white-space: nowrap; color: var(--text); font-weight: 400; }
.td-name { font-weight: 500; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
.td-address { color: var(--text-secondary); max-width: 220px; overflow: hidden; text-overflow: ellipsis; font-weight: 400; }
.stage-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  letter-spacing: 0;
}
.pri-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
}
.td-link {
  color: var(--accent-blue);
  text-decoration: none;
  font-weight: 500;
  font-size: 11px;
}
.td-link:hover { text-decoration: underline; }
.td-score {
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
}

/* ---- MODAL (legacy, kept for safety) ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  width: 560px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.2s ease;
}
.modal-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.modal-header h2 { font-size: 20px; font-weight: 700; color: var(--bg-dark); letter-spacing: -0.5px; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px 8px; }
.modal-body { padding: 20px 28px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.modal-metric { background: var(--bg); border-radius: var(--radius); padding: 12px; text-align: center; }
.modal-metric-label { font-size: 10px; color: var(--text-muted); letter-spacing: 0; margin-bottom: 4px; font-weight: 500; }
.modal-metric-value { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.modal-section { margin-bottom: 16px; }
.modal-section-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0; margin-bottom: 6px; text-transform: uppercase; }
.modal-info { background: var(--bg); border-radius: var(--radius); padding: 12px 14px; font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.modal-links { display: flex; gap: 8px; flex-wrap: wrap; }
.modal-link-pill { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; font-size: 11px; font-weight: 500; border-radius: 20px; text-decoration: none; transition: opacity 0.15s; }
.modal-link-pill:hover { opacity: 0.75; }

/* ---- EMPTY / LOADING ---- */
.empty { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.empty h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; color: var(--text-secondary); letter-spacing: -0.3px; }
.empty p { font-size: 14px; font-weight: 400; }
.loading { text-align: center; padding: 80px; color: var(--text-muted); font-size: 14px; }

/* ---- ANIMATIONS ---- */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* ---- STAGE FILTER ---- */
.stage-filter {
  max-width: 1440px;
  margin: 16px auto 0;
  padding: 0 40px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* ---- RESPONSIVE ---- */
@media (max-width: 768px) {
  .stats-bar { flex-direction: column; }
  .kanban-col { min-width: 240px; }
  .header { padding: 0 20px; }
  .main { padding: 0 20px; }
  .stats-bar { padding: 0 20px; }
  .search-input { width: 160px; }
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ============================================================
// TaskFlow Dashboard
// Reads from the same Google Sheet the extension syncs to
// ============================================================

const CLIENT_ID = "259209463080-lv24g90qhqmh3mskh4c17iu16b4glq9n.apps.googleusercontent.com";
const SCOPES = "https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file";
const SHEETS_BASE = "https://sheets.googleapis.com/v4/spreadsheets";

const STAGES = [
  { id: "prospecting", label: "Prospecting", color: "#6366F1" },
  { id: "underwriting", label: "Underwriting", color: "#E8A838" },
  { id: "loi", label: "LOI Submitted", color: "#3B82F6" },
  { id: "loi_accepted", label: "LOI Accepted", color: "#0EA5E9" },
  { id: "dead", label: "Dead", color: "#94A3B8" },
];

const DD_STAGES = [
  { id: "negotiation_psa", label: "Negotiation PSA", color: "#8B5CF6" },
  { id: "approved_psa", label: "Approved PSA", color: "#0EA5E9" },
  { id: "closed", label: "Closed", color: "#10B981" },
];

const PRIORITIES = {
  high: { label: "High", color: "#EF4444", bg: "#FEF2F2" },
  medium: { label: "Med", color: "#E8A838", bg: "#FFFBEB" },
  low: { label: "Low", color: "#6B7280", bg: "#F9FAFB" },
};

const KPI_GOALS = {
  findingProperties: 20, propertyUW: 10, loiCreated: 7, loiSent: 7,
  callNewBrokers: 20, brokerFollowUp: 50, dealsClosed: 1
};

let state = {
  authenticated: false,
  accessToken: null,
  tokenClient: null,
  spreadsheetId: null,
  deals: [],
  ddDeals: [],
  properties: [],
  section: "acquisitions",
  view: "kanban",
  search: "",
  sortCol: null,
  sortDir: "asc",
  selectedDeal: null,
  selectedDealDetail: null,
  dealDetailTenants: [],
  dealDetailComps: [],
  dealDetailSynced: false,
  dealDetailProFormaNoi: 0,
  dealDetailProFormaExpenses: 0,
  dealDetailLoanData: { rate: 0, amortYears: 0, downPct: 0, exitCap: 0 },
  dealDetailIRRCashflows: [],
  dealDetailEquityIn: 0,
  dealDetailAcqDate: null,
  dealDetailFinTab: "overview",
  selectedDD: null,
  ddDetailId: null,
  selectedProp: null,
  selectedContact: null,
  contactsView: "cards",
  ddFilter: "all",
  stageFilter: "all",
  showUWCalc: false,
  kpiPeriod: "week",
  loading: false,
};

const app = document.getElementById("app");

// ---- FORMATTING ----
function fmt$(n) { n=parseFloat(n); if(!n&&n!==0)return"—"; if(n>=1e6)return"$"+(n/1e6).toFixed(2)+"M"; if(n>=1e3)return"$"+(n/1e3).toFixed(0)+"K"; return"$"+n.toLocaleString(); }
function fmtNum(n) { n=parseFloat(n); if(!n&&n!==0)return"—"; return n.toLocaleString(); }
function esc(s) { if(!s)return""; const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }
function stg(id) { return STAGES.find(s=>s.id===id)||STAGES[0]; }
function pri(id) { return PRIORITIES[id]||PRIORITIES.medium; }

function scoreColor(s) {
  s=parseFloat(s); if(!s)return"#94A3B8";
  if(s<=3) return`rgb(${239},${68+(s-1)*30},${68})`;
  if(s<=6) return`rgb(${239-(s-4)*30},${168+(s-4)*20},${68})`;
  return`rgb(${16+(10-s)*20},${185-(10-s)*10},${129})`;
}
function scoreBg(s) {
  s=parseFloat(s); if(!s)return"#F9FAFB";
  if(s<=3) return"#FEF2F2"; if(s<=6) return"#FFFBEB"; return"#F0FDF4";
}

// ---- DEAL HEALTH + KPI HELPERS ----
const PRE_LOI_STAGES_DASH = ["prospecting", "underwriting"];

function getDecayedScoreDash(deal) {
  const raw = parseFloat(deal.score);
  if (!raw) return { display: 0, original: 0, decay: 0 };
  if (!PRE_LOI_STAGES_DASH.includes(deal.stage)) return { display: raw, original: raw, decay: 0 };
  const created = parseInt(deal.createdAt) || Date.now();
  const weeks = Math.floor((Date.now() - created) / (7 * 24 * 60 * 60 * 1000));
  const decay = weeks * 0.5;
  const display = Math.max(0, raw - decay);
  return { display: Math.round(display * 10) / 10, original: raw, decay };
}

function calcDOMDash(listingDate) {
  if (!listingDate) return null;
  const listed = new Date(listingDate + "T00:00:00");
  const now = new Date(); now.setHours(0,0,0,0);
  const days = Math.floor((now - listed) / 864e5);
  return days >= 0 ? days : null;
}

function getDealFlagsDash(d) {
  if (d.stage === "dead" || d.stage === "loi_accepted") return [];
  const now = Date.now();
  const DAY = 864e5;
  const flags = [];
  const age = (now - (d.createdAt || now)) / DAY;
  const callCount = (d.callLog || []).length;
  const lastCall = callCount ? Math.max(...d.callLog.map(c => c.time || 0)) : 0;
  const daysSinceLastCall = lastCall ? (now - lastCall) / DAY : age;
  const stageAge = d.stageChangedDate ? (now - d.stageChangedDate) / DAY : age;
  const uwAge = d.uwGeneratedDate ? (now - d.uwGeneratedDate) / DAY : 0;
  const loiAge = d.loiGeneratedDate ? (now - d.loiGeneratedDate) / DAY : 0;
  const loiSentAge = d.loiSentDate ? (now - new Date(d.loiSentDate + "T00:00:00").getTime()) / DAY : 0;

  if (age > 2 && callCount === 0) flags.push({ type: "No broker call", msg: `📞 Call broker (${Math.floor(age)}d)` });
  if (!d.brokerReached && age > 5 && callCount > 0 && callCount < 3) flags.push({ type: "Not reached", msg: `📞 Follow up (${Math.floor(age)}d)` });
  if (d.stage === "prospecting" && stageAge > 4) flags.push({ type: "Stale prospecting", msg: `📋 Stale ${Math.floor(stageAge)}d` });
  if (d.stage === "underwriting" && !d.uwLink && stageAge > 2) flags.push({ type: "No UW", msg: `📊 Gen UW (${Math.floor(stageAge)}d)` });
  if (d.uwLink && !d.loiLink && uwAge > 2) flags.push({ type: "No LOI", msg: `📝 Gen LOI (${Math.floor(uwAge)}d)` });
  if (d.loiLink && d.stage !== "loi" && d.stage !== "loi_accepted" && loiAge > 1) flags.push({ type: "LOI not sent", msg: `📤 Update stage (${Math.floor(loiAge)}d)` });
  if (d.stage === "loi" && loiSentAge > 3) flags.push({ type: "LOI no response", msg: `📞 LOI follow up (${Math.floor(loiSentAge)}d)` });
  const ds = getDecayedScoreDash(d);
  if (ds.display > 0 && ds.display < 5 && PRE_LOI_STAGES_DASH.includes(d.stage)) flags.push({ type: "Low score", msg: `⚠️ Score ${ds.display}` });
  if (callCount >= 3 && !d.brokerReached && daysSinceLastCall > 5) flags.push({ type: "Can't reach", msg: `🔄 New contact (${callCount} calls)` });
  return flags;
}

function renderAcqKPIs() {
  const all = state.deals;
  const active = all.filter(d => d.stage !== "dead" && d.stage !== "loi_accepted");

  // Pipeline summary
  const totalValue = active.reduce((s, d) => s + d.askingPrice, 0);
  const avgScore = active.length ? (active.reduce((s, d) => s + getDecayedScoreDash(d).display, 0) / active.length) : 0;
  const domDeals = active.filter(d => calcDOMDash(d.listingDate) !== null);
  const avgDOM = domDeals.length ? Math.round(domDeals.reduce((s, d) => s + calcDOMDash(d.listingDate), 0) / domDeals.length) : 0;
  const hotCount = active.filter(d => d.hotList).length;

  // Stage counts
  const stageCounts = {};
  ["prospecting","underwriting","loi","loi_accepted","psa","closed","dead"].forEach(s => {
    stageCounts[s] = all.filter(d => d.stage === s).length;
  });

  // Conversion funnel
  const prospCount = stageCounts["prospecting"] || 0;
  const uwCount = stageCounts["underwriting"] || 0;
  const loiCount = stageCounts["loi"] || 0;
  const ddCount = stageCounts["loi_accepted"] || 0;
  const pToUW = prospCount > 0 ? Math.round((uwCount / prospCount) * 100) : 0;
  const uwToLOI = uwCount > 0 ? Math.round((loiCount / uwCount) * 100) : 0;
  const loiToDD = loiCount > 0 ? Math.round((ddCount / loiCount) * 100) : 0;

  // Stage velocity (avg days currently in each stage)
  const now = Date.now();
  const DAY = 864e5;
  function avgStageAge(stageId) {
    const inStage = active.filter(d => d.stage === stageId && d.stageChangedDate);
    if (!inStage.length) return null;
    return Math.round(inStage.reduce((s, d) => s + (now - d.stageChangedDate) / DAY, 0) / inStage.length);
  }
  const velProsp = avgStageAge("prospecting");
  const velUW = avgStageAge("underwriting");
  const velLOI = avgStageAge("loi");

  // Deal health
  const flaggedDeals = active.filter(d => getDealFlagsDash(d).length > 0);
  const flagTypeCounts = {};
  flaggedDeals.forEach(d => {
    getDealFlagsDash(d).forEach(f => {
      flagTypeCounts[f.type] = (flagTypeCounts[f.type] || 0) + 1;
    });
  });

  // Stale deals (no activity 7+ days, not dead)
  const staleDeals = active.filter(d => {
    const la = d.lastActivity || d.createdAt || 0;
    return (now - la) > 7 * DAY;
  });

  let h = `<div style="max-width:1440px;margin:16px auto 0;padding:0 40px">`;

  // ---- Pipeline Summary ----
  h += `<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px">`;
  [
    ["Active Deals", active.length, "deals"],
    ["Pipeline Value", fmt$(totalValue), "asking price"],
    ["Avg Score", avgScore ? avgScore.toFixed(1) + "/10" : "—", "decayed"],
    ["Avg DOM", avgDOM ? avgDOM + " days" : "—", "days on market"],
    ["Hot List", hotCount, "this week"],
  ].forEach(([label, val, sub]) => {
    h += `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value">${val}</div><div class="stat-sub">${sub}</div></div>`;
  });
  h += `</div>`;

  // ---- Conversion Funnel + Stage Velocity row ----
  h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">`;

  // Conversion Funnel
  h += `<div class="stat-card" style="padding:16px 18px">
    <div class="stat-label" style="margin-bottom:12px">Conversion Funnel</div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">`;
  [
    { label: "Prospecting", count: prospCount, color: "#6366F1" },
    { label: "Underwriting", count: uwCount, color: "#E8A838", rate: pToUW },
    { label: "LOI", count: loiCount, color: "#3B82F6", rate: uwToLOI },
    { label: "DD", count: ddCount, color: "#0EA5E9", rate: loiToDD },
  ].forEach((stage, i) => {
    if (i > 0) {
      h += `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <span style="font-size:9px;font-weight:700;color:${stage.rate >= 50 ? '#10B981' : stage.rate >= 25 ? '#E8A838' : '#EF4444'}">${stage.rate}%</span>
        <span style="color:#CBD5E1;font-size:14px">→</span>
      </div>`;
    }
    h += `<div style="text-align:center">
      <div style="font-size:18px;font-weight:800;font-family:'Inter',sans-serif;color:${stage.color}">${stage.count}</div>
      <div style="font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.4px">${stage.label}</div>
    </div>`;
  });
  h += `</div></div>`;

  // Stage Velocity
  h += `<div class="stat-card" style="padding:16px 18px">
    <div class="stat-label" style="margin-bottom:12px">Stage Velocity (avg days in stage)</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">`;
  [
    ["Prospecting", velProsp, "#6366F1"],
    ["Underwriting", velUW, "#E8A838"],
    ["LOI", velLOI, "#3B82F6"],
  ].forEach(([label, val, color]) => {
    h += `<div style="text-align:center;background:var(--border-light);border-radius:8px;padding:10px 8px">
      <div style="font-size:16px;font-weight:800;font-family:'Inter',sans-serif;color:${color}">${val !== null ? val + "d" : "—"}</div>
      <div style="font-size:9px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">${label}</div>
    </div>`;
  });
  h += `</div></div>`;

  h += `</div>`; // close grid

  // ---- Deal Health + Stale Deals row ----
  h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">`;

  // Deal Health
  h += `<div style="background:var(--bg-card);border:1px solid ${flaggedDeals.length ? '#FECACA' : 'var(--border-light)'};border-radius:10px;padding:16px 18px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="stat-label" style="color:${flaggedDeals.length ? '#DC2626' : 'var(--text-muted)'}">Deal Health Flags</div>
      <span style="font-size:18px;font-weight:800;font-family:'Inter',sans-serif;color:${flaggedDeals.length ? '#DC2626' : '#10B981'}">${flaggedDeals.length}</span>
    </div>`;

  if (flaggedDeals.length) {
    // Flag type breakdown
    if (Object.keys(flagTypeCounts).length) {
      h += `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">`;
      Object.entries(flagTypeCounts).forEach(([type, cnt]) => {
        h += `<span style="font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;background:#FEF2F2;color:#DC2626;border:1px solid #FECACA">${type}: ${cnt}</span>`;
      });
      h += `</div>`;
    }
    // List flagged deals
    h += `<div style="max-height:120px;overflow-y:auto">`;
    flaggedDeals.slice(0, 8).forEach(d => {
      const flags = getDealFlagsDash(d);
      const link = d.listingLink || d.costarLink || d.uwLink || "";
      h += `<div style="padding:4px 0;border-bottom:1px solid var(--border-light);font-size:11px;${link?'cursor:pointer':''}"><a ${link?`href="${esc(link)}" target="_blank"`:'href="#"'} style="text-decoration:none"><span style="font-weight:600;color:var(--text)">${esc(d.name)}</span><span style="color:var(--text-muted)"> — ${flags.map(f => f.msg).join(", ")}</span></a></div>`;
    });
    if (flaggedDeals.length > 8) h += `<div style="font-size:10px;color:var(--text-muted);padding:4px 0">+${flaggedDeals.length - 8} more</div>`;
    h += `</div>`;
  } else {
    h += `<div style="color:#10B981;font-size:12px;font-weight:600">All deals healthy ✓</div>`;
  }
  h += `</div>`;

  // Stale Deals
  h += `<div style="background:var(--bg-card);border:1px solid ${staleDeals.length ? '#FDE68A' : 'var(--border-light)'};border-radius:10px;padding:16px 18px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="stat-label" style="color:${staleDeals.length ? '#D97706' : 'var(--text-muted)'}">Stale Deals (7+ days no activity)</div>
      <span style="font-size:18px;font-weight:800;font-family:'Inter',sans-serif;color:${staleDeals.length ? '#D97706' : '#10B981'}">${staleDeals.length}</span>
    </div>`;

  if (staleDeals.length) {
    h += `<div style="max-height:140px;overflow-y:auto">`;
    staleDeals.forEach(d => {
      const la = d.lastActivity || d.createdAt || 0;
      const days = Math.floor((now - la) / DAY);
      const link = d.listingLink || d.costarLink || d.uwLink || "";
      h += `<a ${link?`href="${esc(link)}" target="_blank"`:'href="#"'} style="padding:4px 0;border-bottom:1px solid var(--border-light);font-size:11px;display:flex;justify-content:space-between;text-decoration:none;${link?'cursor:pointer':''}">
        <span style="font-weight:600;color:var(--text)">${esc(d.name)}</span>
        <span style="color:#D97706;font-weight:600;font-size:10px">${days}d idle</span>
      </a>`;
    });
    h += `</div>`;
  } else {
    h += `<div style="color:#10B981;font-size:12px;font-weight:600">No stale deals ✓</div>`;
  }
  h += `</div>`;

  h += `</div>`; // close health row

  h += `</div>`; // close outer wrapper
  return h;
}

// ---- AUTH ----
function initAuth() {
  state.tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { console.error("Auth error:", resp); return; }
      state.accessToken = resp.access_token;
      state.authenticated = true;
      await findSpreadsheet();
      await loadDeals();
      render();
    }
  });
}

function doLogin() {
  state.tokenClient.requestAccessToken({ prompt: "consent" });
}

async function apiGet(url) {
  const resp = await fetch(url, { headers: { "Authorization": "Bearer " + state.accessToken } });
  if (resp.status === 401) { state.authenticated = false; render(); return null; }
  return resp.json();
}

async function findSpreadsheet() {
  // Search Drive for the TaskFlow spreadsheet
  const searchUrl = "https://www.googleapis.com/drive/v3/files?q=" +
    encodeURIComponent("name='TaskFlow Data' and mimeType='application/vnd.google-apps.spreadsheet'") +
    "&fields=files(id,name)&orderBy=modifiedTime desc";

  // Need drive.readonly scope too — but we only have sheets.readonly
  // Instead, try to load from localStorage or prompt for spreadsheet ID
  let ssId = localStorage.getItem("creflow_spreadsheet_id");
  if (!ssId) {
    ssId = prompt("Enter your TaskFlow spreadsheet ID.\n\nYou can find it in the URL of your TaskFlow Data spreadsheet:\nhttps://docs.google.com/spreadsheets/d/{THIS_PART}/edit");
    if (ssId) localStorage.setItem("creflow_spreadsheet_id", ssId);
  }
  state.spreadsheetId = ssId;
}

async function loadDeals() {
  if (!state.spreadsheetId) return;
  state.loading = true;
  render();

  const data = await apiGet(SHEETS_BASE + "/" + state.spreadsheetId + "/values/Acquisitions");
  if (data && data.values && data.values.length >= 2) {
    const headers = data.values[0];
    state.deals = data.values.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] || ""; });
      obj.askingPrice = parseFloat(obj.askingPrice) || 0;
      obj.noi = parseFloat(obj.noi) || 0;
      obj.capRate = parseFloat(obj.capRate) || 0;
      obj.sqft = parseFloat(obj.sqft) || 0;
      obj.createdAt = parseInt(obj.createdAt) || Date.now();
      obj.lastActivity = parseInt(obj.lastActivity) || Date.now();
      obj.uwGeneratedDate = parseInt(obj.uwGeneratedDate) || 0;
      obj.loiGeneratedDate = parseInt(obj.loiGeneratedDate) || 0;
      obj.stageChangedDate = parseInt(obj.stageChangedDate) || 0;
      obj.sfLoiLink = obj.sfLoiLink || "";
      obj.hotList = obj.hotList === "true" || obj.hotList === true;
      obj.watchList = obj.watchList === "true" || obj.watchList === true;
      obj.brokerReached = obj.brokerReached === "true" || obj.brokerReached === true;
      obj.listingStatus = obj.listingStatus || "active";
      obj.loiResponseStatus = obj.loiResponseStatus || "";
      obj.loiCounteredDate = parseInt(obj.loiCounteredDate) || 0;
      try { obj.callLog = obj.callLog ? JSON.parse(obj.callLog) : []; } catch(e) { obj.callLog = []; }
      try { obj.stageHistory = obj.stageHistory ? JSON.parse(obj.stageHistory) : []; } catch(e) { obj.stageHistory = []; }
      obj.propertyCondition = obj.propertyCondition || "";
      obj.roofCondition = obj.roofCondition || "";
      obj.parkingCondition = obj.parkingCondition || "";
      obj.hvacCondition = obj.hvacCondition || "";
      obj.roofAge = parseFloat(obj.roofAge) || 0;
      obj.hvacAge = parseFloat(obj.hvacAge) || 0;
      obj.parkingAge = parseFloat(obj.parkingAge) || 0;
      obj.deferredMaint = parseFloat(obj.deferredMaint) || 0;
      obj.envConcerns = obj.envConcerns || "";
      obj.locationType = obj.locationType || "";
      obj.shadowAnchor = obj.shadowAnchor === "true" || obj.shadowAnchor === true;
      obj.shadowAnchorName = obj.shadowAnchorName || "";
      obj.coTenancy = obj.coTenancy || "";
      obj.marketRent = parseFloat(obj.marketRent) || 0;
      obj.pop1mi = parseFloat(obj.pop1mi) || 0;
      obj.ahi1mi = parseFloat(obj.ahi1mi) || 0;
      obj.pop5mi = parseFloat(obj.pop5mi) || 0;
      obj.ahi5mi = parseFloat(obj.ahi5mi) || 0;
      obj.popGrowthRate = parseFloat(obj.popGrowthRate) || 0;
      obj.daytimePopulation = parseFloat(obj.daytimePopulation) || 0;
      return obj;
    });
  } else { state.deals = []; }

  // Load Due Diligence
  const ddData = await apiGet(SHEETS_BASE + "/" + state.spreadsheetId + "/values/DueDiligence");
  if (ddData && ddData.values && ddData.values.length >= 2) {
    const ddH = ddData.values[0];
    state.ddDeals = ddData.values.slice(1).map(row => {
      const obj = {};
      ddH.forEach((h, i) => { obj[h] = row[i] || ""; });
      try { obj.tasks = obj.tasks ? JSON.parse(obj.tasks) : []; } catch(e) { obj.tasks = []; }
      try { obj.tenants = obj.tenants ? JSON.parse(obj.tenants) : []; } catch(e) { obj.tenants = []; }
      return obj;
    });
  } else { state.ddDeals = []; }

  // Load Asset Management
  const amData = await apiGet(SHEETS_BASE + "/" + state.spreadsheetId + "/values/AssetManagement");
  if (amData && amData.values && amData.values.length >= 2) {
    const amH = amData.values[0];
    state.properties = amData.values.slice(1).map(row => {
      const obj = {};
      amH.forEach((h, i) => { obj[h] = row[i] || ""; });
      obj.noi = parseFloat(obj.noi) || 0;
      try { obj.tasks = obj.tasks ? JSON.parse(obj.tasks) : []; } catch(e) { obj.tasks = []; }
      return obj;
    });
  } else { state.properties = []; }

  state.loading = false;
}

// ---- FILTERING ----
function filteredDeals() {
  let list = state.deals;
  if (state.stageFilter === "watchlist") list = list.filter(d => d.watchList);
  else if (state.stageFilter !== "all") list = list.filter(d => d.stage === state.stageFilter);
  else list = list.filter(d => d.stage !== "loi_accepted");
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(d =>
      (d.name||"").toLowerCase().includes(q) ||
      (d.address||"").toLowerCase().includes(q) ||
      (d.broker||"").toLowerCase().includes(q) ||
      (d.brokerContact||"").toLowerCase().includes(q) ||
      (d.brokerPhone||"").includes(q)
    );
  }
  return list;
}

function renderStageFilter() {
  const stages = [{id:"all",label:"All Active"}, ...STAGES, {id:"watchlist",label:"★ Watch List",color:"#F59E0B"}];
  let h = `<div class="stage-filter">`;
  stages.forEach(s => {
    const isActive = state.stageFilter === s.id;
    const color = s.color || "#6E6E73";
    h += `<button data-stage-filter="${s.id}" style="padding:5px 14px;border:none;border-radius:20px;font-size:12px;cursor:pointer;background:${isActive?color:'rgba(0,0,0,0.05)'};color:${isActive?'#fff':'var(--text-secondary)'};font-weight:${isActive?'600':'500'};font-family:'Inter',sans-serif;transition:all 0.15s;letter-spacing:-0.01em">${s.label}</button>`;
  });
  h += `</div>`;
  return h;
}

function sortedDeals(deals) {
  if (!state.sortCol) return deals;
  const col = state.sortCol;
  const dir = state.sortDir === "asc" ? 1 : -1;
  return [...deals].sort((a, b) => {
    let va = a[col], vb = b[col];
    if (typeof va === "number" || !isNaN(parseFloat(va))) {
      return (parseFloat(va||0) - parseFloat(vb||0)) * dir;
    }
    return String(va||"").localeCompare(String(vb||"")) * dir;
  });
}

// ---- RENDER ----
function render() {
  if (!state.authenticated) { renderLogin(); return; }
  if (state.loading) { app.innerHTML = renderHeader() + `<div class="loading">Loading deals...</div>`; wireHeaderEvents(); return; }

  let h = renderHeader();
  if (state.section === "acquisitions") {
    if (state.selectedDealDetail) {
      const det = state.deals.find(d => d.id === state.selectedDealDetail);
      if (det) { h += `<div class="main">` + renderDealDetail(det) + `</div>`; }
      else { state.selectedDealDetail = null; }
    }
    if (!state.selectedDealDetail) {
      h += renderStats();
      h += renderStageFilter();
      h += `<div class="main">`;
      if (state.view === "kanban") h += renderKanban();
      else h += renderTable();
      h += `</div>`;
    }
  } else if (state.section === "dd") {
    h += `<div class="main">` + renderDDSection() + `</div>`;
  } else if (state.section === "am") {
    h += `<div class="main">` + renderAMSection() + `</div>`;
  } else if (state.section === "contacts") {
    h += `<div class="main">` + renderContactsSection() + `</div>`;
  } else if (state.section === "kpis") {
    h += `<div class="main">` + renderKPIsTab() + `</div>`;
  }
  app.innerHTML = h;
  wireHeaderEvents();
  wireEvents();
  if (state.section === "acquisitions" && state.selectedDealDetail) wireDealDetailEvents();
  if (state.section === "dd") wireDDEvents();
  if (state.section === "am") wireAMEvents();
  if (state.section === "contacts") wireContactsEvents();
  if (state.section === "kpis") wireKPIEvents();
}

function renderLogin() {
  app.innerHTML = `<div class="login-container">
    <h1>TaskFlow</h1>
    <p>Deal pipeline dashboard</p>
    <button class="login-btn" id="login-btn">Connect Google Account</button>
    <span class="login-note">Read-only access to your TaskFlow spreadsheet</span>
  </div>`;
  document.getElementById("login-btn").addEventListener("click", doLogin);
}

function renderHeader() {
  let subToggle = "";
  if (state.section === "acquisitions") {
    subToggle = `<div class="view-toggle" style="margin-left:12px">
      <button class="view-btn ${state.view==='kanban'?'active':''}" data-view="kanban">Kanban</button>
      <button class="view-btn ${state.view==='table'?'active':''}" data-view="table">Table</button>
    </div>`;
  }
  return `<div class="header"><div class="header-inner">
    <div class="header-left">
      <h1>TaskFlow</h1>
      <div class="view-toggle">
        <button class="view-btn ${state.section==='acquisitions'?'active':''}" data-section="acquisitions">Acquisitions</button>
        <button class="view-btn ${state.section==='dd'?'active':''}" data-section="dd">DD</button>
        <button class="view-btn ${state.section==='am'?'active':''}" data-section="am">AM</button>
        <button class="view-btn ${state.section==='contacts'?'active':''}" data-section="contacts">Contacts</button>
        <button class="view-btn ${state.section==='kpis'?'active':''}" data-section="kpis">KPIs</button>
      </div>
      ${subToggle}
    </div>
    <div class="header-right">
      <input type="text" class="search-input" id="search-input" placeholder="Search..." value="${esc(state.search)}">
      <button class="login-btn" style="padding:8px 16px;font-size:12px" id="refresh-btn">↻ Refresh</button>
    </div>
  </div></div>`;
}

function wireHeaderEvents() {
  document.querySelectorAll("[data-section]").forEach(btn => {
    btn.addEventListener("click", () => { state.section = btn.dataset.section; state.search = ""; state.ddDetailId = null; render(); });
  });
  document.querySelectorAll("[data-view]").forEach(btn => {
    btn.addEventListener("click", () => { state.view = btn.dataset.view; render(); });
  });
  const searchEl = document.getElementById("search-input");
  if (searchEl) {
    searchEl.addEventListener("input", (e) => { state.search = e.target.value; render(); searchEl.focus(); });
  }
  const refreshBtn = document.getElementById("refresh-btn");
  if (refreshBtn) refreshBtn.addEventListener("click", async () => { await loadDeals(); render(); });
}

function renderStats() {
  const deals = filteredDeals();
  const active = deals.filter(d => d.stage !== "dead" && d.stage !== "closed");
  const totalPipeline = active.reduce((s, d) => s + d.askingPrice, 0);
  const avgCap = active.length ? (active.reduce((s,d) => s + d.capRate, 0) / active.length) : 0;
  const uwCount = deals.filter(d => d.stage === "underwriting").length;
  const loiCount = deals.filter(d => d.stage === "loi" || d.stage === "loi_accepted").length;
  const psaCount = deals.filter(d => d.stage === "psa").length;
  const closedCount = deals.filter(d => d.stage === "closed").length;

  return `<div class="stats-bar">
    <div class="stat-card"><div class="stat-label">Active Pipeline</div><div class="stat-value">${active.length}</div><div class="stat-sub">deals</div></div>
    <div class="stat-card"><div class="stat-label">Total Value</div><div class="stat-value">${fmt$(totalPipeline)}</div><div class="stat-sub">asking price</div></div>
    <div class="stat-card"><div class="stat-label">Avg Cap Rate</div><div class="stat-value">${avgCap.toFixed(2)}%</div><div class="stat-sub">active deals</div></div>
    <div class="stat-card"><div class="stat-label">Underwriting</div><div class="stat-value">${uwCount}</div><div class="stat-sub">deals</div></div>
    <div class="stat-card"><div class="stat-label">LOI Out</div><div class="stat-value">${loiCount}</div><div class="stat-sub">submitted + accepted</div></div>
    <div class="stat-card"><div class="stat-label">Under PSA</div><div class="stat-value">${psaCount}</div><div class="stat-sub">deals</div></div>
    <div class="stat-card"><div class="stat-label">Closed</div><div class="stat-value">${closedCount}</div><div class="stat-sub">deals</div></div>
  </div>`;
}

// ---- KANBAN ----
function renderKanban() {
  const deals = filteredDeals();
  const visibleStages = STAGES.filter(s => s.id !== "dead");
  let h = `<div class="kanban">`;
  visibleStages.forEach(stage => {
    const stageDeals = deals.filter(d => d.stage === stage.id);
    h += `<div class="kanban-col">
      <div class="kanban-col-header" style="background:${stage.color}15">
        <span class="kanban-col-title" style="color:${stage.color}">${stage.label}</span>
        <span class="kanban-col-count" style="color:${stage.color}">${stageDeals.length}</span>
      </div>
      <div class="kanban-cards">`;
    if (!stageDeals.length) {
      h += `<div style="text-align:center;padding:20px 10px;color:#CBD5E1;font-size:11px">No deals</div>`;
    }
    stageDeals.forEach(d => {
      const p = pri(d.priority);
      const sc = parseFloat(d.score);
      h += `<div class="k-card" data-deal-id="${esc(d.id)}">
        <div class="k-card-name">${esc(d.name)}</div>
        <div class="k-card-address">${esc(d.address)}</div>
        <div class="k-card-metrics">
          <span class="k-metric"><strong>${fmt$(d.askingPrice)}</strong></span>
          <span class="k-metric">${d.capRate}% cap</span>
          ${d.sqft ? `<span class="k-metric">${fmtNum(d.sqft)} SF</span>` : ""}
        </div>`;

      // Links
      const links = [];
      if (d.listingLink) {
        const src = d.listingLink.includes("crexi") ? "Crexi" : d.listingLink.includes("costar") ? "CoStar" : "Listing";
        links.push({ label: src, url: d.listingLink, color: "#3B82F6", bg: "#EFF6FF" });
      }
      if (d.loiLink) links.push({ label: "LOI", url: d.loiLink, color: "#16A34A", bg: "#F0FDF4" });

  return h;

// ---- SCORECARD SCORING ----
function calcPhysicalScore(d) {
  if (!d.propertyCondition) return null;
  const condMap = { excellent:9, good:7, fair:5, poor:3 };
  let score = condMap[d.propertyCondition.toLowerCase()] || 5;

  // Age scoring helper — % of useful life remaining
  function ageAdj(age, usefulLife) {
    if (!age) return 0;
    const pctRemaining = Math.max(0, (usefulLife - age) / usefulLife);
    if (pctRemaining > 0.75) return 1;
    if (pctRemaining > 0.5) return 0;
    if (pctRemaining > 0.25) return -0.5;
    if (pctRemaining > 0) return -1.5;
    return -3; // exceeded useful life
  }

  // Roof condition + age (25yr useful life)
  if (d.roofCondition) score += condMap[d.roofCondition.toLowerCase()] ? 0.5 : 0;
  score += ageAdj(d.roofAge, 25) * 0.4;

  // HVAC condition + age (20yr useful life)
  if (d.hvacCondition) score += condMap[d.hvacCondition.toLowerCase()] ? 0.5 : 0;
  score += ageAdj(d.hvacAge, 20) * 0.4;

  // Parking condition + age (25yr useful life)
  if (d.parkingCondition) score += condMap[d.parkingCondition.toLowerCase()] ? 0.5 : 0;
  score += ageAdj(d.parkingAge, 25) * 0.2;

  if (d.deferredMaint > 50000) score -= 1;
  if (d.envConcerns) score -= 1;

  return Math.max(0, Math.min(10, Math.round(score * 10) / 10));
}
function calcCompsScore(d) {
  const compsCount = state.dealDetailComps.length;
  if (!state.dealDetailSynced) return null;
  if (compsCount < 3) return { partial: true, count: compsCount };
  if (compsCount === 3) return 8;
  if (compsCount === 4) return 9;
  return 10;
}
function calcFinancialScore(d) {
  if (!state.dealDetailSynced) return null;

  const tenants = state.dealDetailTenants;
  const currentCap = parseFloat(d.capRate) || 0;
  const askingPrice = parseFloat(d.askingPrice) || 0;
  const proFormaNoi = state.dealDetailProFormaNoi || 0;
  const proFormaCap = (askingPrice > 0 && proFormaNoi > 0) ? (proFormaNoi / askingPrice) * 100 : 0;

  if (!currentCap && !proFormaCap) return null;

  // Score current cap rate (0-4 points)
  let currentScore = currentCap >= 8 ? 4 : currentCap >= 6 ? 3 : currentCap >= 4 ? 1.5 : 0.5;

  // Score pro forma cap rate (0-4 points)
  let pfScore = 0;
  if (proFormaCap >= 15) pfScore = 4;
  else if (proFormaCap >= 11) pfScore = 3.5;
  else if (proFormaCap >= 9) pfScore = 2.5;
  else if (proFormaCap >= 8) pfScore = 1.5;
  else if (proFormaCap > 0) pfScore = 0.5;

  // Spread bonus (0-2 points) tempered by achievability
  const spread = proFormaCap - currentCap;
  let spreadBonus = 0;
  if (spread > 0 && proFormaCap > 0) {
    const rawBonus = spread >= 8 ? 2 : spread >= 5 ? 1.5 : spread >= 3 ? 1 : spread >= 1 ? 0.5 : 0;
    // Achievability based on largest vacant suite
    const vacantSuites = tenants.filter(t => t.isVacant);
    let achievability = 1.0;
    if (vacantSuites.length) {
      const maxVacantSf = Math.max(...vacantSuites.map(t => t.sqft || 0));
      achievability = maxVacantSf > 10000 ? 0.25 : maxVacantSf > 5000 ? 0.5 : maxVacantSf > 1500 ? 0.7 : 0.9;
    }
    spreadBonus = rawBonus * achievability;
  }

  return Math.min(10, Math.round((currentScore + pfScore + spreadBonus) * 10) / 10);
}
function calcTenantCreditScore(tenants) {
  const active = (tenants || []).filter(t => !t.isVacant);
  if (!active.length) return null;
  const creditMap = { national:10, regional:7, local:5, "mom & pop":3, "mom and pop":3 };
  let totalRent = 0, weightedScore = 0;
  active.forEach(t => {
    const rent = t.annualRent || 0;
    const key = (t.creditType || "").toLowerCase();
    const score = creditMap[key] || 5;
    totalRent += rent; weightedScore += score * rent;
  });
  if (!totalRent) return active.length ? (active.reduce((s,t)=>s+(creditMap[(t.creditType||"").toLowerCase()]||5),0)/active.length) : null;
  return Math.round(weightedScore / totalRent * 10) / 10;
}
function calcLeaseRiskScore(tenants, walt) {
  if (!state.dealDetailSynced) return null;
  const allTenants = tenants || [];
  if (!allTenants.length) return null;

  const now = Date.now();
  const DAY = 864e5;
  const marketRent = parseFloat(state.deals.find(d => d.id === state.selectedDealDetail)?.marketRent) || 0;
  const totalGLA = allTenants.reduce((s, t) => s + (t.sqft || 0), 0);
  const activeTenants = allTenants.filter(t => !t.isVacant);
  const vacantTenants = allTenants.filter(t => t.isVacant);
  const totalGrossRent = activeTenants.reduce((s, t) => s + (t.annualRent || 0), 0);
  const tenantCount = activeTenants.length;

  // Adjusted market rent by suite size
  function adjMarket(sqft) {
    if (!marketRent) return 0;
    if (sqft < 1500) return marketRent * 0.8;
    if (sqft < 5000) return marketRent * 0.7;
    if (sqft < 10000) return marketRent * 0.6;
    return marketRent * 0.5;
  }

  // Tenure in years from lease start
  function tenureYears(leaseStart) {
    if (!leaseStart) return 0;
    return (now - new Date(leaseStart + "T00:00:00").getTime()) / (365 * DAY);
  }

  // Per-tenant risk score (0=max risk, 10=no risk)
  function tenantRiskScore(t) {
    const sfPct = totalGLA > 0 ? (t.sqft || 0) / totalGLA : 0;
    const tenure = tenureYears(t.leaseStart);
    const adj = adjMarket(t.sqft);
    const aboveMarket = adj > 0 && (t.rentPerSf || 0) > adj;
    const belowMarket = adj > 0 && (t.rentPerSf || 0) < adj;

    // Tenure modifier (0.7-1.3 multiplier on risk)
    const tenureMod = tenure >= 10 ? 0.7 : tenure >= 5 ? 0.85 : tenure >= 2 ? 1.0 : 1.3;

    let risk = 0; // higher = more risky

    if (t.isMTM || (t.leaseEnd || "").toUpperCase() === "MTM") {
      // MTM — scored by tenure
      const mtmRisk = tenure >= 10 ? 1 : tenure >= 5 ? 2 : tenure >= 2 ? 4 : 7;
      risk = mtmRisk;
    } else {
      // Non-MTM — scored by urgency
      const leaseEndMs = t.leaseEnd ? new Date(t.leaseEnd + "T00:00:00").getTime() : 0;
      const monthsLeft = leaseEndMs ? (leaseEndMs - now) / (30 * DAY) : 999;
      const urgencyRisk = monthsLeft <= 6 ? 8 : monthsLeft <= 18 ? 5 : monthsLeft <= 24 ? 3 : 1;
      risk = urgencyRisk * tenureMod;
    }

    // Health modifier — below market reduces risk (upside), above market amplifies it
    if (belowMarket) risk *= 0.6;
    else if (aboveMarket) risk *= 1.4;

    // Weight by SF % of GLA
    return { weightedRisk: risk * sfPct, sfPct };
  }

  // Score active tenants
  let totalWeightedRisk = 0;
  let totalWeight = 0;
  activeTenants.forEach(t => {
    const { weightedRisk, sfPct } = tenantRiskScore(t);
    totalWeightedRisk += weightedRisk;
    totalWeight += sfPct;
  });

  // Vacant suite penalties
  vacantTenants.forEach(t => {
    const sfPct = totalGLA > 0 ? (t.sqft || 0) / totalGLA : 0;
    const adj = adjMarket(t.sqft);
    // Vacancy is risky but size determines how risky
    let vacRisk = t.sqft > 10000 ? 9 : t.sqft > 5000 ? 7 : t.sqft > 1500 ? 5 : 3;
    // If market rent exists and space is small (easy to lease), reduce penalty
    if (adj > 0 && t.sqft <= 1500) vacRisk *= 0.7;
    totalWeightedRisk += vacRisk * sfPct;
    totalWeight += sfPct;
  });

  // Convert weighted risk to 0-10 score (10 = low risk)
  const avgRisk = totalWeight > 0 ? totalWeightedRisk / totalWeight : 0;
  let score = Math.max(0, 10 - avgRisk);

  // Concentration flag penalties
  activeTenants.forEach(t => {
    const revPct = totalGrossRent > 0 ? (t.annualRent || 0) / totalGrossRent : 0;
    const highThreshold = tenantCount <= 4 ? 0.30 : 0.20;
    const medThreshold = tenantCount <= 4 ? null : 0.30;
    if (revPct > 0.30) score -= 1.5;
    else if (medThreshold && revPct > medThreshold) score -= 0.75;
    else if (revPct > highThreshold) score -= 0.5;
  });

  return Math.max(0, Math.min(10, Math.round(score * 10) / 10));
}
function renderScorecard(d, tenants) {
  const CIRC = 175.9;
  function ring(score, label, noDataLabel) {

    const color = !hasData ? "#CBD5E1" : score >= 8 ? "#10B981" : score >= 5 ? "#E8A838" : "#EF4444";
    const filled = hasData ? (score / 10) * CIRC : 0;
    const rem = CIRC - filled;
    const display = hasData ? score : "–";
    return `<div style="text-align:center;flex:1">
      <svg width="70" height="70" viewBox="0 0 70 70">
        <circle cx="35" cy="35" r="28" fill="none" stroke="#E2E8F0" stroke-width="5"/>
        <circle cx="35" cy="35" r="28" fill="none" stroke="${color}" stroke-width="5"
          stroke-dasharray="${filled.toFixed(1)} ${rem.toFixed(1)}" stroke-dashoffset="44" stroke-linecap="round"
          transform="rotate(-90 35 35)"/>
        <text x="35" y="39" text-anchor="middle" font-size="15" font-weight="800" fill="${color}" font-family="Inter,sans-serif">${display}</text>
      </svg>

    </div>`;
  }
